---
- name: Show Ubuntu version
  ansible.builtin.debug:
    msg: "{{ ansible_facts['distribution_release'] }}"

- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
  become: true

- name: Create directory for Docker GPG key
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /tmp/docker.gpg
    mode: '0644'
  become: true

- name: Dearmor Docker GPG key
  ansible.builtin.command: gpg --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg
  become: true

- name: Clean up temporary GPG key
  ansible.builtin.file:
    path: /tmp/docker.gpg
    state: absent
  become: true

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    state: present
    filename: docker
  become: true

- name: Update apt cache after adding Docker repository
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Check available Docker versions
  ansible.builtin.command: apt-cache madison docker-ce
  register: mythic_available_versions
  changed_when: false

- name: Show available Docker versions
  ansible.builtin.debug:
    var: mythic_available_versions.stdout_lines

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  become: true

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ mythic_user }}"
    groups: docker
    append: true
  become: true

- name: Start and enable Docker service
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  become: true

- name: Wait for Docker socket to be available
  ansible.builtin.wait_for:
    path: /var/run/docker.sock
    timeout: 60
  become: true

---
- name: Ensure mythic home directory exists with proper permissions
  ansible.builtin.file:
    path: "{{ mythic_home }}"
    state: directory
    owner: "{{ mythic_user }}"
    group: "{{ mythic_user }}"
    mode: '0750'
  become: true

- name: Ensure Mythic installation directory exists with proper permissions
  ansible.builtin.file:
    path: "{{ mythic_install_dir }}"
    state: directory
    owner: "{{ mythic_user }}"
    group: "{{ mythic_user }}"
    mode: '0750'
  become: true

- name: Clone Mythic repository
  ansible.builtin.git:
    repo: "{{ mythic_repo }}"
    dest: "{{ mythic_install_dir }}"
    force: yes
  become: true
  become_user: "{{ mythic_user }}"

- name: Build Mythic
  ansible.builtin.command:
    cmd: make
    chdir: "{{ mythic_install_dir }}"
  become: true
  changed_when: false

- name: Template Mythic environment file
  ansible.builtin.template:
    src: mythic.env.j2
    dest: "{{ mythic_install_dir }}/.env"
    owner: "{{ mythic_user }}"
    group: "{{ mythic_user }}"
    mode: '0600'
  become: true
  notify: Restart mythic services

- name: Start Mythic services
  ansible.builtin.command:
    cmd: ./mythic-cli start
    chdir: "{{ mythic_install_dir }}"
  become: true
  register: mythic_start
  changed_when: mythic_start.rc == 0

- name: Wait for Docker images to be pulled and initial startup
  block:
    - name: Get container status
      ansible.builtin.shell: |
        docker ps --no-trunc
      register: mythic_docker_status
      changed_when: false

    - name: Set container facts
      ansible.builtin.set_fact:
        mythic_nginx_running: "{{ 'mythic_nginx' in mythic_docker_status.stdout and '(healthy)' in mythic_docker_status.stdout }}"
        mythic_postgres_running: "{{ 'mythic_postgres' in mythic_docker_status.stdout and '(healthy)' in mythic_docker_status.stdout }}"
        mythic_rabbitmq_running: "{{ 'mythic_rabbitmq' in mythic_docker_status.stdout and '(healthy)' in mythic_docker_status.stdout }}"
        mythic_graphql_running: "{{ 'mythic_graphql' in mythic_docker_status.stdout and '(healthy)' in mythic_docker_status.stdout }}"
        mythic_server_running: "{{ 'mythic_server' in mythic_docker_status.stdout and '(healthy)' in mythic_docker_status.stdout }}"
        mythic_react_running: "{{ 'mythic_react' in mythic_docker_status.stdout and '(healthy)' in mythic_docker_status.stdout }}"
        mythic_jupyter_running: "{{ 'mythic_jupyter' in mythic_docker_status.stdout and '(healthy)' in mythic_docker_status.stdout }}"
        mythic_documentation_running: "{{ 'mythic_documentation' in mythic_docker_status.stdout and '(healthy)' in mythic_docker_status.stdout }}"

    - name: Show current status
      ansible.builtin.debug:
        msg:
          - "Container Status:"
          - "nginx: {{ mythic_nginx_running }}"
          - "postgres: {{ mythic_postgres_running }}"
          - "rabbitmq: {{ mythic_rabbitmq_running }}"
          - "graphql: {{ mythic_graphql_running }}"
          - "server: {{ mythic_server_running }}"
          - "react: {{ mythic_react_running }}"
          - "jupyter: {{ mythic_jupyter_running }}"
          - "documentation: {{ mythic_documentation_running }}"

    - name: Verify all containers are healthy
      ansible.builtin.assert:
        that:
          - mythic_nginx_running
          - mythic_postgres_running
          - mythic_rabbitmq_running
          - mythic_graphql_running
          - mythic_server_running
          - mythic_react_running
          - mythic_jupyter_running
          - mythic_documentation_running
        fail_msg: "Not all containers are healthy yet"
        success_msg: "All containers are healthy"

  rescue:
    - name: Show container status on failure
      ansible.builtin.debug:
        msg: "{{ mythic_docker_status.stdout_lines }}"

- name: Mark setup as complete
  ansible.builtin.debug:
    msg: "Mythic setup complete - all containers are healthy"

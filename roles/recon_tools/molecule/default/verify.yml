---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:
    - name: Include default variables
      ansible.builtin.include_vars:
        file: "../../defaults/main.yml"

    - name: Verify nmap is installed
      ansible.builtin.command: nmap --version
      register: recon_tools_nmap_version
      changed_when: false
      failed_when: false

    - name: Assert nmap is working
      ansible.builtin.assert:
        that:
          - recon_tools_nmap_version.rc == 0
          - recon_tools_nmap_version.stdout is defined
          - "'Nmap' in recon_tools_nmap_version.stdout"
        fail_msg: "nmap is not properly installed"
        success_msg: "nmap is installed: {{ recon_tools_nmap_version.stdout_lines[0] | default('') }}"

    - name: Verify netexec is installed (Kali uses netexec, Ubuntu pip installs as nxc)
      ansible.builtin.shell: netexec --version || nxc --version
      environment:
        PATH: "/root/.local/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] | default('/usr/bin:/bin') }}"
      register: recon_tools_netexec_version
      changed_when: false
      failed_when: false

    - name: Note netexec status (optional, not available on all systems)
      ansible.builtin.debug:
        # netexec --version returns rc=1 but outputs version info, so check stdout
        msg: >-
          netexec status: {{ 'Available (' + recon_tools_netexec_version.stdout_lines[0] | default('') + ')'
          if recon_tools_netexec_version.stdout is defined
          and recon_tools_netexec_version.stdout | length > 0
          else 'Not available (expected on Ubuntu - requires Rust to build)' }}

    # NetExec slinky/scuffy module verification (for .lnk/.scf coercion)
    - name: Check if NetExec is installed via pipx
      ansible.builtin.stat:
        path: /root/.local/pipx/venvs/netexec/bin/python
      register: recon_tools_netexec_pipx_python
      when:
        - recon_tools_netexec_version.stdout is defined
        - recon_tools_netexec_version.stdout | length > 0
        - ansible_facts['distribution'] != 'Kali'

    - name: Verify NetExec slinky module (pipx installation)
      ansible.builtin.command: >
        /root/.local/pipx/venvs/netexec/bin/python -c
        "from netexec.modules.smb.slinky import NXCModule; print('slinky module OK')"
      register: recon_tools_netexec_slinky_check
      changed_when: false
      failed_when: false
      when:
        - recon_tools_netexec_version.stdout is defined
        - recon_tools_netexec_version.stdout | length > 0
        - ansible_facts['distribution'] != 'Kali'
        - recon_tools_netexec_pipx_python is defined
        - recon_tools_netexec_pipx_python.stat.exists | default(false)

    - name: Verify NetExec scuffy module (pipx installation)
      ansible.builtin.command: >
        /root/.local/pipx/venvs/netexec/bin/python -c
        "from netexec.modules.smb.scuffy import NXCModule; print('scuffy module OK')"
      register: recon_tools_netexec_scuffy_check
      changed_when: false
      failed_when: false
      when:
        - recon_tools_netexec_version.stdout is defined
        - recon_tools_netexec_version.stdout | length > 0
        - ansible_facts['distribution'] != 'Kali'
        - recon_tools_netexec_pipx_python is defined
        - recon_tools_netexec_pipx_python.stat.exists | default(false)

    - name: Note NetExec module status
      ansible.builtin.debug:
        msg:
          - "NetExec coercion modules (.lnk/.scf file coercion):"
          - "  slinky: {{ 'Available' if recon_tools_netexec_slinky_check.rc | default(1) == 0 else 'Not verified or not available' }}"
          - "  scuffy: {{ 'Available' if recon_tools_netexec_scuffy_check.rc | default(1) == 0 else 'Not verified or not available' }}"
      when:
        - recon_tools_netexec_version.stdout is defined
        - recon_tools_netexec_version.stdout | length > 0
        - ansible_facts['distribution'] != 'Kali'

    # CRITICAL: Verify impacket regsecrets module is available
    # NetExec 1.4.0+ requires this module for SMB functionality
    # Reference: https://github.com/Pennyw0rth/NetExec/issues/685
    - name: Verify impacket regsecrets module is available (required for NetExec SMB)
      ansible.builtin.command: /opt/impacket/venv/bin/python -c "from impacket.examples import regsecrets; print('OK')"
      register: recon_tools_regsecrets_check
      changed_when: false
      failed_when: false

    - name: Assert impacket regsecrets module is available
      ansible.builtin.assert:
        that:
          - recon_tools_regsecrets_check.rc == 0
        fail_msg: |
          CRITICAL: impacket.examples.regsecrets module not found!
          NetExec SMB module will not work without this module.
          Solution: Install impacket from GitHub source (not PyPI/apt).
          Set recon_tools_impacket_from_source: true
        success_msg: "impacket regsecrets module is available (required for NetExec SMB)"

    # Verify regsecrets is importable from the NetExec pipx venv (non-Kali)
    # This catches the case where pipx inject fails to replace PyPI impacket
    - name: Verify regsecrets is importable from NetExec pipx venv
      ansible.builtin.command: >-
        /root/.local/pipx/venvs/netexec/bin/python -c
        "from impacket.examples import regsecrets; print('OK')"
      register: recon_tools_pipx_regsecrets_check
      changed_when: false
      failed_when: false
      when:
        - ansible_facts['distribution'] != 'Kali'
        - recon_tools_netexec_pipx_python is defined
        - recon_tools_netexec_pipx_python.stat.exists | default(false)

    - name: Assert regsecrets is importable from NetExec pipx venv
      ansible.builtin.assert:
        that:
          - recon_tools_pipx_regsecrets_check.rc == 0
        fail_msg: |
          impacket.examples.regsecrets not importable from NetExec pipx venv.
          The pipx inject likely failed to replace PyPI impacket with the source version.
        success_msg: "regsecrets importable from NetExec pipx venv"
      when:
        - ansible_facts['distribution'] != 'Kali'
        - recon_tools_netexec_pipx_python is defined
        - recon_tools_netexec_pipx_python.stat.exists | default(false)

    # Verify regsecrets is importable from system Python (Kali)
    # Kali apt netexec uses system Python, so impacket 0.13.0 must be installed system-wide
    - name: Verify regsecrets is importable from system Python (Kali)
      ansible.builtin.command: python3 -c "from impacket.examples import regsecrets; print('OK')"
      register: recon_tools_system_regsecrets_check
      changed_when: false
      failed_when: false
      when: ansible_facts['distribution'] == 'Kali'

    - name: Assert regsecrets is importable from system Python (Kali)
      ansible.builtin.assert:
        that:
          - recon_tools_system_regsecrets_check.rc == 0
        fail_msg: |
          impacket.examples.regsecrets not importable from system Python on Kali.
          The system-wide impacket install may have failed or been downgraded.
        success_msg: "regsecrets importable from system Python (Kali apt netexec will work)"
      when: ansible_facts['distribution'] == 'Kali'

    - name: "Check impacket secretsdump is available (Kali: impacket-secretsdump, Ubuntu: secretsdump.py)"
      ansible.builtin.shell: which impacket-secretsdump || which secretsdump.py
      environment:
        PATH: "/root/.local/bin:/usr/local/bin:/opt/impacket/examples:{{ ansible_facts['env']['PATH'] | default('/usr/bin:/bin') }}"
      register: recon_tools_secretsdump_check
      changed_when: false
      failed_when: false

    - name: Assert impacket secretsdump is available
      ansible.builtin.assert:
        that:
          - recon_tools_secretsdump_check.rc == 0
          - recon_tools_secretsdump_check.stdout is defined
        fail_msg: "impacket secretsdump is not available"
        success_msg: "impacket secretsdump is available at {{ recon_tools_secretsdump_check.stdout }}"

    - name: Check additional impacket tools (GetUserSPNs, GetNPUsers, ntlmrelayx, findDelegation)
      ansible.builtin.shell: which impacket-{{ item }} || which {{ item }}.py
      environment:
        PATH: "/root/.local/bin:/usr/local/bin:/opt/impacket/examples:{{ ansible_facts['env']['PATH'] | default('/usr/bin:/bin') }}"
      register: recon_tools_impacket_extra_checks
      changed_when: false
      failed_when: false
      loop:
        - GetUserSPNs
        - GetNPUsers
        - ntlmrelayx
        - findDelegation

    - name: Assert additional impacket tools are available
      ansible.builtin.assert:
        that:
          - item.rc == 0
          - item.stdout is defined
          - item.stdout | length > 0
        fail_msg: "impacket {{ item.item }} is not available"
        success_msg: "impacket {{ item.item }} is available at {{ item.stdout }}"
      loop: "{{ recon_tools_impacket_extra_checks.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Verify enum4linux is installed
      ansible.builtin.command: which enum4linux
      environment:
        PATH: "/usr/local/bin:/usr/bin:/bin"
      register: recon_tools_enum4linux_check
      changed_when: false
      failed_when: false
      when: ansible_facts['os_family'] == 'Debian'

    - name: Assert enum4linux is available
      ansible.builtin.assert:
        that:
          - recon_tools_enum4linux_check.rc == 0
          - recon_tools_enum4linux_check.stdout is defined
        fail_msg: "enum4linux is not installed"
        success_msg: "enum4linux is available at {{ recon_tools_enum4linux_check.stdout }}"
      when: ansible_facts['os_family'] == 'Debian'

    - name: Verify enum4linux-ng is installed (Kali only)
      ansible.builtin.command: which enum4linux-ng
      register: recon_tools_enum4linuxng_check
      changed_when: false
      failed_when: false
      when: ansible_facts['distribution'] == 'Kali'

    - name: Assert enum4linux-ng is available (Kali only)
      ansible.builtin.assert:
        that:
          - recon_tools_enum4linuxng_check.rc == 0
          - recon_tools_enum4linuxng_check.stdout is defined
        fail_msg: "enum4linux-ng is not installed"
        success_msg: "enum4linux-ng is available at {{ recon_tools_enum4linuxng_check.stdout }}"
      when: ansible_facts['distribution'] == 'Kali'

    - name: Check which BloodHound command is available
      ansible.builtin.shell: which bloodhound-python || which bloodhound.py
      environment:
        PATH: "/root/.local/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] | default('/usr/bin:/bin') }}"
      register: recon_tools_bloodhound_which
      changed_when: false
      failed_when: false
      when: recon_tools_install_bloodhound | default(true)

    - name: Verify BloodHound Python is installed
      ansible.builtin.command: "{{ recon_tools_bloodhound_which.stdout }} --version"
      environment:
        PATH: "/root/.local/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] | default('/usr/bin:/bin') }}"
      register: recon_tools_bloodhound_version
      changed_when: false
      failed_when: false
      when:
        - recon_tools_install_bloodhound | default(true)
        - recon_tools_bloodhound_which.rc == 0

    - name: Assert BloodHound Python is available
      ansible.builtin.assert:
        that:
          - recon_tools_bloodhound_which.rc == 0
          - recon_tools_bloodhound_which.stdout is defined
          - recon_tools_bloodhound_which.stdout | length > 0
        fail_msg: "BloodHound Python is not properly installed"
        success_msg: "BloodHound Python is installed at {{ recon_tools_bloodhound_which.stdout }}"
      when: recon_tools_install_bloodhound | default(true)

    - name: Check which Certipy command is available
      ansible.builtin.shell: which certipy || which certipy-ad
      environment:
        PATH: "/root/.local/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] | default('/usr/bin:/bin') }}"
      register: recon_tools_certipy_which
      changed_when: false
      failed_when: false
      when: recon_tools_install_certipy | default(true)

    - name: Verify Certipy is installed
      ansible.builtin.command: "{{ recon_tools_certipy_which.stdout }} --version"
      environment:
        PATH: "/root/.local/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] | default('/usr/bin:/bin') }}"
      register: recon_tools_certipy_version
      changed_when: false
      failed_when: false
      when:
        - recon_tools_install_certipy | default(true)
        - recon_tools_certipy_which.rc == 0

    - name: Assert Certipy is available
      ansible.builtin.assert:
        that:
          - recon_tools_certipy_which.rc == 0
          - recon_tools_certipy_which.stdout is defined
          - recon_tools_certipy_which.stdout | length > 0
        fail_msg: "Certipy is not properly installed"
        success_msg: "Certipy is installed at {{ recon_tools_certipy_which.stdout }}"
      when: recon_tools_install_certipy | default(true)

    # Verify /usr/bin symlinks exist
    # On Kali: symlink created from certipy-ad -> certipy
    # On non-Kali: symlink created from pip install location -> /usr/bin/certipy
    - name: Verify certipy symlink exists in /usr/bin
      ansible.builtin.stat:
        path: /usr/bin/certipy
      register: recon_tools_certipy_symlink
      when:
        - recon_tools_install_certipy | default(true)

    - name: Assert certipy is accessible from /usr/bin
      ansible.builtin.assert:
        that:
          - recon_tools_certipy_symlink.stat.exists
        fail_msg: "certipy symlink not found in /usr/bin"
        success_msg: "certipy is accessible from /usr/bin"
      when:
        - recon_tools_install_certipy | default(true)

    - name: Verify bloodhound-python symlink exists in /usr/bin
      ansible.builtin.stat:
        path: /usr/bin/bloodhound-python
      register: recon_tools_bloodhound_symlink
      when:
        - recon_tools_install_bloodhound | default(true)
        - ansible_facts['distribution'] != 'Kali'

    - name: Assert bloodhound-python is accessible from /usr/bin
      ansible.builtin.assert:
        that:
          - recon_tools_bloodhound_symlink.stat.exists
        fail_msg: "bloodhound-python symlink not found in /usr/bin"
        success_msg: "bloodhound-python is accessible from /usr/bin"
      when:
        - recon_tools_install_bloodhound | default(true)
        - ansible_facts['distribution'] != 'Kali'

    - name: Verify adidnsdump symlink exists in /usr/bin
      ansible.builtin.stat:
        path: /usr/bin/adidnsdump
      register: recon_tools_adidnsdump_symlink
      when:
        - recon_tools_install_adidnsdump | default(true)
        - ansible_facts['distribution'] != 'Kali'

    - name: Assert adidnsdump is accessible from /usr/bin
      ansible.builtin.assert:
        that:
          - recon_tools_adidnsdump_symlink.stat.exists
        fail_msg: "adidnsdump symlink not found in /usr/bin"
        success_msg: "adidnsdump is accessible from /usr/bin"
      when:
        - recon_tools_install_adidnsdump | default(true)
        - ansible_facts['distribution'] != 'Kali'

    - name: Set netexec status for summary
      ansible.builtin.set_fact:
        recon_tools_netexec_status: >-
          {{ recon_tools_netexec_version.stdout_lines[0] | default('N/A')
          if recon_tools_netexec_version.stdout is defined
          and recon_tools_netexec_version.stdout | length > 0
          else 'Not available' }}

    - name: Set enum4linux status for summary
      ansible.builtin.set_fact:
        recon_tools_enum4linux_status: >-
          {{ recon_tools_enum4linux_check.stdout
          if recon_tools_enum4linux_check is defined
          and recon_tools_enum4linux_check.rc is defined
          and recon_tools_enum4linux_check.rc == 0
          else 'Not available (Kali only)' }}

    - name: Set bloodhound status for summary
      ansible.builtin.set_fact:
        recon_tools_bloodhound_status: >-
          {{ recon_tools_bloodhound_which.stdout
          if recon_tools_bloodhound_which is defined
          and recon_tools_bloodhound_which.rc is defined
          and recon_tools_bloodhound_which.rc == 0
          else 'Not installed' }}

    - name: Set certipy status for summary
      ansible.builtin.set_fact:
        recon_tools_certipy_status: >-
          {{ recon_tools_certipy_which.stdout
          if recon_tools_certipy_which is defined
          and recon_tools_certipy_which.rc is defined
          and recon_tools_certipy_which.rc == 0
          else 'Not installed' }}

    - name: Display verification summary
      ansible.builtin.debug:
        msg:
          - "======== Ares Network Tools Verification ========"
          - ""
          - "--- Core Tools ---"
          - "nmap: Installed and functional"
          - "netexec: {{ recon_tools_netexec_status }}"
          - ""
          - "--- Impacket Tools ---"
          - >-
            regsecrets module (venv): {{ 'OK' if recon_tools_regsecrets_check.rc == 0
            else 'MISSING!' }}
          - >-
            regsecrets module (runtime): {{
            'OK (pipx venv)' if (recon_tools_pipx_regsecrets_check.rc | default(1) == 0)
            else ('OK (system python)' if (recon_tools_system_regsecrets_check.rc | default(1) == 0)
            else 'NOT VERIFIED') }}
          - "impacket-secretsdump: {{ recon_tools_secretsdump_check.stdout }}"
          - >-
            impacket-GetUserSPNs: {{
            recon_tools_impacket_extra_checks.results[0].stdout
            if recon_tools_impacket_extra_checks.results[0].rc == 0
            else 'N/A' }}
          - >-
            impacket-GetNPUsers: {{
            recon_tools_impacket_extra_checks.results[1].stdout
            if recon_tools_impacket_extra_checks.results[1].rc == 0
            else 'N/A' }}
          - >-
            impacket-findDelegation: {{
            recon_tools_impacket_extra_checks.results[3].stdout
            if recon_tools_impacket_extra_checks.results[3].rc == 0
            else 'N/A' }}
          - ""
          - "--- AD Enumeration Tools ---"
          - "enum4linux-ng: {{ recon_tools_enum4linux_status }}"
          - "bloodhound: {{ recon_tools_bloodhound_status }}"
          - "certipy: {{ recon_tools_certipy_status }}"
          - ""
          - "================================================="

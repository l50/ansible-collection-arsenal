---
# Install bloodhound-python via pipx for dependency isolation
# This prevents conflicts with other tools that depend on impacket

- name: Check if bloodhound-python is already installed via pipx
  ansible.builtin.command: pipx list --global
  register: recon_tools_bloodhound_pipx_list
  changed_when: false
  failed_when: false
  become: true
  environment:
    HOME: /root

- name: Install bloodhound-python via pipx
  ansible.builtin.command: pipx install --global bloodhound
  register: recon_tools_bloodhound_pipx_install
  changed_when: "'installed package bloodhound' in recon_tools_bloodhound_pipx_install.stdout"
  become: true
  environment:
    HOME: /root
    PATH: "{{ recon_tools_rust_bin_path }}:{{ recon_tools_pipx_bin_path }}:{{ ansible_env.PATH }}"
  when: "'bloodhound' not in recon_tools_bloodhound_pipx_list.stdout | default('')"

- name: Create symlink for bloodhound-python in /usr/bin
  ansible.builtin.file:
    src: "{{ recon_tools_pipx_bin_path }}/bloodhound-python"
    dest: /usr/bin/bloodhound-python
    state: link
    force: true
  become: true

---
- name: Converge
  hosts: all
  gather_facts: true
  tasks:
    - name: Include default variables
      ansible.builtin.include_vars:
        file: "../../defaults/main.yml"

    - name: Include role under test
      ansible.builtin.include_role:
        name: l50.arsenal.cracking_tools
      vars:
        # Disable GPU support in containers
        cracking_tools_gpu_support: false
        # Skip SecLists to speed up testing
        cracking_tools_install_seclists: false

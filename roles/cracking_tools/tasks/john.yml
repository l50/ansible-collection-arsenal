---
- name: Install John the Ripper from package
  ansible.builtin.apt:
    name: "{{ cracking_tools_john_package }}"
    state: present
  become: true
  when:
    - not cracking_tools_john_from_source
    - ansible_facts['os_family'] == 'Debian'

- name: Install John the Ripper from source
  when: cracking_tools_john_from_source
  block:
    - name: Install build dependencies for John
      ansible.builtin.apt:
        name:
          - build-essential
          - libssl-dev
          - zlib1g-dev
          - libbz2-dev
          - libgmp-dev
          - libpcap-dev
        state: present
      become: true

    - name: Clone John repository
      ansible.builtin.git:
        repo: "{{ cracking_tools_john_repo }}"
        dest: /opt/john
        version: "{{ cracking_tools_john_version }}"
        force: true
      become: true

    - name: Configure John
      ansible.builtin.command: ./configure
      args:
        chdir: /opt/john/src
        creates: /opt/john/src/Makefile
      become: true

    - name: Build John
      ansible.builtin.command: make -j$(nproc)
      args:
        chdir: /opt/john/src
        creates: /opt/john/run/john
      become: true

    - name: Create symlink for john
      ansible.builtin.file:
        src: /opt/john/run/john
        dest: /usr/local/bin/john
        state: link
      become: true

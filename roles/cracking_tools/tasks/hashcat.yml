---
- name: Install hashcat from package
  ansible.builtin.apt:
    name: "{{ cracking_tools_hashcat_package }}"
    state: present
  become: true
  when:
    - not (cracking_tools_hashcat_from_source | bool)
    - ansible_facts['os_family'] == 'Debian'

- name: Install hashcat from source
  when: cracking_tools_hashcat_from_source | bool
  block:
    - name: Install build dependencies for hashcat
      ansible.builtin.apt:
        name:
          - cmake
          - build-essential
          - checkinstall
          - git
          - libgcc-s1
          - libclang-dev
        state: present
      become: true

    - name: Install hashcat build dependencies from repository
      ansible.builtin.apt:
        name: hashcat
        state: build-dep
      become: true
      register: cracking_tools_build_dep_result
      failed_when: false  # Don't fail if hashcat package not in repos

    - name: Clone hashcat repository
      ansible.builtin.git:
        repo: "{{ cracking_tools_hashcat_repo }}"
        dest: /opt/hashcat
        version: "{{ cracking_tools_hashcat_version }}"
        force: true
      become: true

    - name: Check if Rust is already installed
      ansible.builtin.stat:
        path: /root/.cargo/bin/rustc
      register: cracking_tools_rustc_stat
      become: true

    - name: Install Rust via rustup (for edition 2024 support)
      when: not cracking_tools_rustc_stat.stat.exists
      block:
        - name: Download rustup installer
          ansible.builtin.get_url:
            url: https://sh.rustup.rs
            dest: /tmp/rustup-init.sh
            mode: '0755'
          become: true

        - name: Run rustup installer
          ansible.builtin.shell: |
            set -o pipefail
            /tmp/rustup-init.sh -y
            . "$HOME/.cargo/env"
            rustup default stable
          args:
            executable: /bin/bash
          become: true
          changed_when: true

        - name: Remove rustup installer
          ansible.builtin.file:
            path: /tmp/rustup-init.sh
            state: absent
          become: true

    - name: Build hashcat
      ansible.builtin.shell: |
        . "$HOME/.cargo/env"
        make -j$(nproc)
      args:
        chdir: /opt/hashcat
        creates: /opt/hashcat/hashcat
      become: true

    - name: Install hashcat binary
      ansible.builtin.copy:
        src: /opt/hashcat/hashcat
        dest: /usr/local/bin/hashcat
        mode: '0755'
        remote_src: true
      become: true

    - name: Create hashcat share directory
      ansible.builtin.file:
        path: /usr/local/share/hashcat
        state: directory
        mode: '0755'
      become: true

    - name: Symlink hashcat OpenCL kernels
      ansible.builtin.file:
        src: /opt/hashcat/OpenCL
        dest: /usr/local/share/hashcat/OpenCL
        state: link
      become: true

    - name: Symlink hashcat modules
      ansible.builtin.file:
        src: /opt/hashcat/modules
        dest: /usr/local/share/hashcat/modules
        state: link
      become: true

    - name: Symlink hashcat hcstat2 (Markov chains statistics)
      ansible.builtin.file:
        src: /opt/hashcat/hashcat.hcstat2
        dest: /usr/local/share/hashcat/hashcat.hcstat2
        state: link
      become: true

---
- name: Check if rockyou.txt.gz exists
  ansible.builtin.stat:
    path: "{{ cracking_tools_rockyou_gz_path }}"
  register: cracking_tools_rockyou_gz

- name: Extract rockyou.txt
  ansible.builtin.command: gunzip "{{ cracking_tools_rockyou_gz_path }}"
  become: true
  when:
    - cracking_tools_extract_rockyou
    - cracking_tools_rockyou_gz.stat.exists
    - "'rockyou' in cracking_tools_wordlists"
  args:
    creates: "{{ cracking_tools_rockyou_path }}"

- name: Download rockyou.txt if not present
  when: "'rockyou' in cracking_tools_wordlists"
  block:
    - name: Check if rockyou.txt exists
      ansible.builtin.stat:
        path: "{{ cracking_tools_rockyou_path }}"
      register: cracking_tools_rockyou_txt

    - name: Download rockyou wordlist
      ansible.builtin.get_url:
        url: "https://github.com/brannondorsey/naive-hashcat/releases/download/data/rockyou.txt"
        dest: "{{ cracking_tools_rockyou_path }}"
        mode: '0644'
      become: true
      when: not cracking_tools_rockyou_txt.stat.exists

- name: Clone SecLists repository
  ansible.builtin.git:
    repo: "{{ cracking_tools_seclists_repo }}"
    dest: "{{ cracking_tools_seclists_path }}"
    depth: 1
    version: master
  become: true
  when:
    - cracking_tools_install_seclists
    - "'seclists_passwords' in cracking_tools_wordlists"

- name: Display installed wordlists
  ansible.builtin.find:
    paths: "{{ cracking_tools_wordlist_dir }}"
    file_type: any
  register: cracking_tools_wordlist_files

- name: Show wordlist summary
  ansible.builtin.debug:
    msg:
      - "Wordlists installed in: {{ cracking_tools_wordlist_dir }}"
      - "Total items: {{ cracking_tools_wordlist_files.matched }}"

---
# Privilege escalation tools for Windows targets
# These tools exploit various Windows privilege escalation vectors

# Privesc tool packages (Kali-specific)
privesc_tools_kali_packages:
  - git
  - python3-dev
  - python3-venv
  - build-essential

# Privesc tool packages (Ubuntu-compatible)
privesc_tools_ubuntu_packages:
  - git
  - python3
  - python3-pip
  - python3-dev
  - python3-venv
  - build-essential

# PrintSpoofer configuration (SeImpersonatePrivilege exploitation)
privesc_tools_install_printspoofer: true
privesc_tools_printspoofer_url: "https://github.com/itm4n/PrintSpoofer/releases/download/v1.0/PrintSpoofer64.exe"
privesc_tools_printspoofer_install_dir: "/opt/privesc/PrintSpoofer"

# SweetPotato configuration (alternative to PrintSpoofer)
# Note: Repository has no release tags, using master branch
privesc_tools_install_sweetpotato: true
privesc_tools_sweetpotato_repo: "https://github.com/CCob/SweetPotato.git"
privesc_tools_sweetpotato_install_dir: "/opt/privesc/SweetPotato"
privesc_tools_sweetpotato_version: "master"

# GodPotato configuration (newer potato exploit)
privesc_tools_install_godpotato: true
privesc_tools_godpotato_url: "https://github.com/BeichenDream/GodPotato/releases/download/V1.20/GodPotato-NET4.exe"
privesc_tools_godpotato_install_dir: "/opt/privesc/GodPotato"

# KrbRelayUp configuration (Kerberos relay local privesc)
# Note: Dec0ne/KrbRelayUp has no precompiled releases; using Flangvik/SharpCollection nightly build
privesc_tools_install_krbrelayup: true
privesc_tools_krbrelayup_url: "https://github.com/Flangvik/SharpCollection/raw/master/NetFramework_4.7_Any/KrbRelayUp.exe"
privesc_tools_krbrelayup_install_dir: "/opt/privesc/KrbRelayUp"

# SharpGPOAbuse configuration (GPO privilege escalation)
# Note: FSecureLABS doesn't provide precompiled releases, using byronkg's fork
# Repository has no release tags, using main branch
privesc_tools_install_sharpgpoabuse: true
privesc_tools_sharpgpoabuse_repo: "https://github.com/byronkg/SharpGPOAbuse.git"
privesc_tools_sharpgpoabuse_install_dir: "/opt/privesc/SharpGPOAbuse"
privesc_tools_sharpgpoabuse_version: "main"

# Seatbelt configuration (Windows enumeration for privesc)
privesc_tools_install_seatbelt: true
privesc_tools_seatbelt_url: "https://github.com/r3motecontrol/Ghostpack-CompiledBinaries/raw/master/Seatbelt.exe"
privesc_tools_seatbelt_install_dir: "/opt/privesc/Seatbelt"

# SharpUp configuration (privesc checks)
privesc_tools_install_sharpup: true
privesc_tools_sharpup_url: "https://github.com/r3motecontrol/Ghostpack-CompiledBinaries/raw/master/SharpUp.exe"
privesc_tools_sharpup_install_dir: "/opt/privesc/SharpUp"

# PowerUp configuration (PowerShell privesc enumeration)
privesc_tools_install_powerup: true
privesc_tools_powerup_url: "https://raw.githubusercontent.com/PowerShellMafia/PowerSploit/master/Privesc/PowerUp.ps1"
privesc_tools_powerup_install_dir: "/opt/privesc/PowerUp"

# PowerUpSQL configuration (MSSQL enumeration and exploitation)
# Reference: https://github.com/NetSPI/PowerUpSQL
privesc_tools_install_powerupsql: true
privesc_tools_powerupsql_url: "https://raw.githubusercontent.com/NetSPI/PowerUpSQL/master/PowerUpSQL.ps1"
privesc_tools_powerupsql_install_dir: "/opt/privesc/PowerUpSQL"

# Impacket configuration (AD delegation, ticket, and MSSQL tooling)
privesc_tools_install_impacket: true
privesc_tools_impacket_from_source: true
privesc_tools_impacket_repo: "https://github.com/fortra/impacket.git"
privesc_tools_impacket_version: "impacket_0_13_0"
privesc_tools_impacket_install_dir: "/opt/impacket"

# Certipy configuration (AD CS abuse)
privesc_tools_install_certipy: true
privesc_tools_certipy_package: "certipy-ad"
privesc_tools_certipy_install_dir: "/opt/certipy"

# WinPEAS configuration (Windows privesc enumeration)
privesc_tools_install_winpeas: true
privesc_tools_winpeas_url: "https://github.com/peass-ng/PEASS-ng/releases/latest/download/winPEASany_ofs.exe"
privesc_tools_winpeas_install_dir: "/opt/privesc/WinPEAS"

# LinPEAS for completeness (Linux privesc enumeration)
privesc_tools_install_linpeas: true
privesc_tools_linpeas_url: "https://github.com/peass-ng/PEASS-ng/releases/latest/download/linpeas.sh"
privesc_tools_linpeas_install_dir: "/opt/privesc/LinPEAS"

# RunasCs configuration (run commands as another user)
privesc_tools_install_runascs: true
privesc_tools_runascs_url: "https://github.com/antonioCoco/RunasCs/releases/download/v1.5/RunasCs.zip"
privesc_tools_runascs_install_dir: "/opt/privesc/RunasCs"

# SCMUACBypass configuration (UAC bypass)
privesc_tools_install_scmuacbypass: true
privesc_tools_scmuacbypass_repo: "https://github.com/rasta-mouse/SCMUACBypass.git"
privesc_tools_scmuacbypass_version: "main"
privesc_tools_scmuacbypass_install_dir: "/opt/privesc/SCMUACBypass"

# noPac configuration (CVE-2021-42287/CVE-2021-42278)
# Note: Repository has no release tags, using main branch
privesc_tools_install_nopac: true
privesc_tools_nopac_repo: "https://github.com/Ridter/noPac.git"
privesc_tools_nopac_install_dir: "/opt/privesc/noPac"
privesc_tools_nopac_version: "main"

# PrintNightmare configuration (CVE-2021-1675)
# Note: Repository has no release tags, using main branch
privesc_tools_install_printnightmare: true
privesc_tools_printnightmare_repo: "https://github.com/cube0x0/CVE-2021-1675.git"
privesc_tools_printnightmare_install_dir: "/opt/privesc/PrintNightmare"
privesc_tools_printnightmare_version: "main"

# krbrelayx configuration (Kerberos relay attacks - includes printerbug for unconstrained delegation)
# Reference: https://github.com/dirkjanm/krbrelayx
# Note: Repository has no release tags, using master branch
privesc_tools_install_krbrelayx: true
privesc_tools_krbrelayx_repo: "https://github.com/dirkjanm/krbrelayx.git"
privesc_tools_krbrelayx_install_dir: "/opt/krbrelayx"
privesc_tools_krbrelayx_version: "master"

# lsassy configuration (LSASS credential dumping - required for unconstrained delegation TGT extraction)
# Reference: https://github.com/Hackndo/lsassy
privesc_tools_install_lsassy: true
privesc_tools_lsassy_install_dir: "/opt/lsassy"

# zerologon configuration (CVE-2020-1472 - Netlogon vulnerability)
# Reference: https://github.com/dirkjanm/CVE-2020-1472
# Note: Repository has no release tags, using master branch
privesc_tools_install_zerologon: true
privesc_tools_zerologon_repo: "https://github.com/dirkjanm/CVE-2020-1472.git"
privesc_tools_zerologon_install_dir: "/opt/privesc/zerologon"
privesc_tools_zerologon_version: "master"

# pygpoabuse configuration (Python GPO abuse for privilege escalation)
# Reference: https://github.com/Hackndo/pyGPOAbuse
privesc_tools_install_pygpoabuse: true
privesc_tools_pygpoabuse_repo: "https://github.com/Hackndo/pyGPOAbuse.git"
privesc_tools_pygpoabuse_install_dir: "/opt/pyGPOAbuse"

# Base directory for all privesc tools
privesc_tools_base_dir: "/opt/privesc"

privesc_tools_update_cache: true

# Tool paths (for verification)
privesc_tools_binaries:
  printspoofer: "/opt/privesc/PrintSpoofer/PrintSpoofer64.exe"
  godpotato: "/opt/privesc/GodPotato/GodPotato-NET4.exe"
  krbrelayup: "/opt/privesc/KrbRelayUp/KrbRelayUp.exe"
  winpeas: "/opt/privesc/WinPEAS/winPEASany_ofs.exe"
  linpeas: "/opt/privesc/LinPEAS/linpeas.sh"
  powerup: "/opt/privesc/PowerUp/PowerUp.ps1"
  powerupsql: "/opt/privesc/PowerUpSQL/PowerUpSQL.ps1"
  nopac: "/opt/privesc/noPac/noPac.py"
  printnightmare: "/opt/privesc/PrintNightmare/CVE-2021-1675.py"
  zerologon: "/usr/local/bin/zerologon"
  pygpoabuse: "/usr/local/bin/pygpoabuse"
  certipy: "/usr/bin/certipy"
  impacket_getst: "/usr/local/bin/impacket-getST"
  impacket_gettgt: "/usr/local/bin/impacket-getTGT"
  impacket_rbcd: "/usr/local/bin/impacket-rbcd"
  impacket_mssqlclient: "/usr/local/bin/impacket-mssqlclient"
  impacket_raisechild: "/usr/local/bin/impacket-raiseChild"
  krbrelayx: "/usr/local/bin/krbrelayx"
  printerbug: "/usr/local/bin/printerbug"

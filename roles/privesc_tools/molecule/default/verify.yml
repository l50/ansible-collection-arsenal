---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:
    - name: Include default variables
      ansible.builtin.include_vars:
        file: "../../defaults/main.yml"

    # PrintSpoofer verification
    - name: Check PrintSpoofer is downloaded
      ansible.builtin.stat:
        path: "{{ privesc_tools_printspoofer_install_dir }}/PrintSpoofer64.exe"
      register: privesc_tools_printspoofer_stat
      when: privesc_tools_install_printspoofer | default(true)

    - name: Assert PrintSpoofer exists
      ansible.builtin.assert:
        that:
          - privesc_tools_printspoofer_stat.stat.exists
        fail_msg: "PrintSpoofer was not downloaded to {{ privesc_tools_printspoofer_install_dir }}"
        success_msg: "PrintSpoofer is available at {{ privesc_tools_printspoofer_install_dir }}/PrintSpoofer64.exe"
      when: privesc_tools_install_printspoofer | default(true)

    # GodPotato verification
    - name: Check GodPotato is downloaded
      ansible.builtin.stat:
        path: "{{ privesc_tools_godpotato_install_dir }}/GodPotato-NET4.exe"
      register: privesc_tools_godpotato_stat
      when: privesc_tools_install_godpotato | default(true)

    - name: Assert GodPotato exists
      ansible.builtin.assert:
        that:
          - privesc_tools_godpotato_stat.stat.exists
        fail_msg: "GodPotato was not downloaded to {{ privesc_tools_godpotato_install_dir }}"
        success_msg: "GodPotato is available at {{ privesc_tools_godpotato_install_dir }}/GodPotato-NET4.exe"
      when: privesc_tools_install_godpotato | default(true)

    # WinPEAS verification
    - name: Check WinPEAS is downloaded
      ansible.builtin.stat:
        path: "{{ privesc_tools_winpeas_install_dir }}/winPEASany_ofs.exe"
      register: privesc_tools_winpeas_stat
      when: privesc_tools_install_winpeas | default(true)

    - name: Assert WinPEAS exists
      ansible.builtin.assert:
        that:
          - privesc_tools_winpeas_stat.stat.exists
        fail_msg: "WinPEAS was not downloaded to {{ privesc_tools_winpeas_install_dir }}"
        success_msg: "WinPEAS is available at {{ privesc_tools_winpeas_install_dir }}/winPEASany_ofs.exe"
      when: privesc_tools_install_winpeas | default(true)

    # LinPEAS verification
    - name: Check LinPEAS is downloaded
      ansible.builtin.stat:
        path: "{{ privesc_tools_linpeas_install_dir }}/linpeas.sh"
      register: privesc_tools_linpeas_stat
      when: privesc_tools_install_linpeas | default(true)

    - name: Assert LinPEAS exists
      ansible.builtin.assert:
        that:
          - privesc_tools_linpeas_stat.stat.exists
        fail_msg: "LinPEAS was not downloaded to {{ privesc_tools_linpeas_install_dir }}"
        success_msg: "LinPEAS is available at {{ privesc_tools_linpeas_install_dir }}/linpeas.sh"
      when: privesc_tools_install_linpeas | default(true)

    - name: Assert LinPEAS is executable
      ansible.builtin.assert:
        that:
          - privesc_tools_linpeas_stat.stat.executable
        fail_msg: "LinPEAS is not executable"
        success_msg: "LinPEAS is executable"
      when:
        - privesc_tools_install_linpeas | default(true)
        - privesc_tools_linpeas_stat.stat.exists

    # PowerUp verification
    - name: Check PowerUp is downloaded
      ansible.builtin.stat:
        path: "{{ privesc_tools_powerup_install_dir }}/PowerUp.ps1"
      register: privesc_tools_powerup_stat
      when: privesc_tools_install_powerup | default(true)

    - name: Assert PowerUp exists
      ansible.builtin.assert:
        that:
          - privesc_tools_powerup_stat.stat.exists
        fail_msg: "PowerUp was not downloaded to {{ privesc_tools_powerup_install_dir }}"
        success_msg: "PowerUp is available at {{ privesc_tools_powerup_install_dir }}/PowerUp.ps1"
      when: privesc_tools_install_powerup | default(true)

    # PowerUpSQL verification
    - name: Check PowerUpSQL is downloaded
      ansible.builtin.stat:
        path: "{{ privesc_tools_powerupsql_install_dir }}/PowerUpSQL.ps1"
      register: privesc_tools_powerupsql_stat
      when: privesc_tools_install_powerupsql | default(true)

    - name: Assert PowerUpSQL exists
      ansible.builtin.assert:
        that:
          - privesc_tools_powerupsql_stat.stat.exists
        fail_msg: "PowerUpSQL was not downloaded to {{ privesc_tools_powerupsql_install_dir }}"
        success_msg: "PowerUpSQL is available at {{ privesc_tools_powerupsql_install_dir }}/PowerUpSQL.ps1"
      when: privesc_tools_install_powerupsql | default(true)

    # noPac verification
    - name: Check noPac is cloned
      ansible.builtin.stat:
        path: "{{ privesc_tools_nopac_install_dir }}/noPac.py"
      register: privesc_tools_nopac_stat
      when: privesc_tools_install_nopac | default(true)

    - name: Assert noPac exists
      ansible.builtin.assert:
        that:
          - privesc_tools_nopac_stat.stat.exists
        fail_msg: "noPac was not cloned to {{ privesc_tools_nopac_install_dir }}"
        success_msg: "noPac is available at {{ privesc_tools_nopac_install_dir }}/noPac.py"
      when: privesc_tools_install_nopac | default(true)

    - name: Check noPac wrapper script exists
      ansible.builtin.stat:
        path: /usr/local/bin/nopac
      register: privesc_tools_nopac_wrapper
      when: privesc_tools_install_nopac | default(true)

    - name: Assert noPac wrapper is available
      ansible.builtin.assert:
        that:
          - privesc_tools_nopac_wrapper.stat.exists
          - privesc_tools_nopac_wrapper.stat.executable
        fail_msg: "noPac wrapper not created at /usr/local/bin/nopac"
        success_msg: "noPac wrapper is available at /usr/local/bin/nopac"
      when: privesc_tools_install_nopac | default(true)

    # PrintNightmare verification
    - name: Check PrintNightmare is cloned
      ansible.builtin.stat:
        path: "{{ privesc_tools_printnightmare_install_dir }}/CVE-2021-1675.py"
      register: privesc_tools_printnightmare_stat
      when: privesc_tools_install_printnightmare | default(true)

    - name: Assert PrintNightmare exists
      ansible.builtin.assert:
        that:
          - privesc_tools_printnightmare_stat.stat.exists
        fail_msg: "PrintNightmare was not cloned to {{ privesc_tools_printnightmare_install_dir }}"
        success_msg: "PrintNightmare is available at {{ privesc_tools_printnightmare_install_dir }}/CVE-2021-1675.py"
      when: privesc_tools_install_printnightmare | default(true)

    - name: Check PrintNightmare symlink exists
      ansible.builtin.stat:
        path: /usr/local/bin/printnightmare
      register: privesc_tools_printnightmare_symlink
      when: privesc_tools_install_printnightmare | default(true)

    - name: Assert PrintNightmare symlink exists
      ansible.builtin.assert:
        that:
          - privesc_tools_printnightmare_symlink.stat.exists
          - privesc_tools_printnightmare_symlink.stat.islnk
        fail_msg: "PrintNightmare symlink not created at /usr/local/bin/printnightmare"
        success_msg: "PrintNightmare symlink is available at /usr/local/bin/printnightmare"
      when: privesc_tools_install_printnightmare | default(true)

    # KrbRelayUp verification
    - name: Check KrbRelayUp binary exists
      ansible.builtin.stat:
        path: "{{ privesc_tools_krbrelayup_install_dir }}/KrbRelayUp.exe"
      register: privesc_tools_krbrelayup_stat
      when: privesc_tools_install_krbrelayup | default(true)

    - name: Assert KrbRelayUp binary exists
      ansible.builtin.assert:
        that:
          - privesc_tools_krbrelayup_stat.stat.exists
        fail_msg: "KrbRelayUp binary was not downloaded to {{ privesc_tools_krbrelayup_install_dir }}/KrbRelayUp.exe"
        success_msg: "KrbRelayUp is available at {{ privesc_tools_krbrelayup_install_dir }}/KrbRelayUp.exe"
      when: privesc_tools_install_krbrelayup | default(true)

    # SharpGPOAbuse verification
    - name: Check SharpGPOAbuse is cloned
      ansible.builtin.stat:
        path: "{{ privesc_tools_sharpgpoabuse_install_dir }}/SharpGPOAbuse-master/SharpGPOAbuse.exe"
      register: privesc_tools_sharpgpoabuse_stat
      when: privesc_tools_install_sharpgpoabuse | default(true)

    - name: Assert SharpGPOAbuse exists
      ansible.builtin.assert:
        that:
          - privesc_tools_sharpgpoabuse_stat.stat.exists
        fail_msg: "SharpGPOAbuse was not cloned to {{ privesc_tools_sharpgpoabuse_install_dir }}"
        success_msg: "SharpGPOAbuse is available at {{ privesc_tools_sharpgpoabuse_install_dir }}"
      when: privesc_tools_install_sharpgpoabuse | default(true)

    # SCMUACBypass verification
    - name: Check SCMUACBypass is cloned
      ansible.builtin.stat:
        path: "{{ privesc_tools_scmuacbypass_install_dir }}"
      register: privesc_tools_scmuacbypass_stat
      when: privesc_tools_install_scmuacbypass | default(true)

    - name: Assert SCMUACBypass directory exists
      ansible.builtin.assert:
        that:
          - privesc_tools_scmuacbypass_stat.stat.exists
          - privesc_tools_scmuacbypass_stat.stat.isdir
        fail_msg: "SCMUACBypass was not cloned to {{ privesc_tools_scmuacbypass_install_dir }}"
        success_msg: "SCMUACBypass is available at {{ privesc_tools_scmuacbypass_install_dir }}"
      when: privesc_tools_install_scmuacbypass | default(true)

    # krbrelayx verification
    - name: Check krbrelayx is cloned
      ansible.builtin.stat:
        path: "{{ privesc_tools_krbrelayx_install_dir }}/krbrelayx.py"
      register: privesc_tools_krbrelayx_stat
      when: privesc_tools_install_krbrelayx | default(true)

    - name: Assert krbrelayx exists
      ansible.builtin.assert:
        that:
          - privesc_tools_krbrelayx_stat.stat.exists
        fail_msg: "krbrelayx was not cloned to {{ privesc_tools_krbrelayx_install_dir }}"
        success_msg: "krbrelayx is available at {{ privesc_tools_krbrelayx_install_dir }}/krbrelayx.py"
      when: privesc_tools_install_krbrelayx | default(true)

    - name: Check krbrelayx wrapper script exists
      ansible.builtin.stat:
        path: /usr/local/bin/krbrelayx
      register: privesc_tools_krbrelayx_wrapper
      when: privesc_tools_install_krbrelayx | default(true)

    - name: Assert krbrelayx wrapper is available
      ansible.builtin.assert:
        that:
          - privesc_tools_krbrelayx_wrapper.stat.exists
          - privesc_tools_krbrelayx_wrapper.stat.executable
        fail_msg: "krbrelayx wrapper not created at /usr/local/bin/krbrelayx"
        success_msg: "krbrelayx wrapper is available at /usr/local/bin/krbrelayx"
      when: privesc_tools_install_krbrelayx | default(true)

    - name: Check printerbug wrapper script exists
      ansible.builtin.stat:
        path: /usr/local/bin/printerbug
      register: privesc_tools_printerbug_wrapper
      when: privesc_tools_install_krbrelayx | default(true)

    - name: Assert printerbug wrapper is available
      ansible.builtin.assert:
        that:
          - privesc_tools_printerbug_wrapper.stat.exists
          - privesc_tools_printerbug_wrapper.stat.executable
        fail_msg: "printerbug wrapper not created at /usr/local/bin/printerbug"
        success_msg: "printerbug wrapper is available at /usr/local/bin/printerbug"
      when: privesc_tools_install_krbrelayx | default(true)

    # Verify impacket regsecrets module is available (required for NetExec SMB)
    - name: Verify impacket regsecrets module in source venv
      ansible.builtin.command: /opt/impacket/venv/bin/python -c "from impacket.examples import regsecrets; print('OK')"
      register: privesc_tools_regsecrets_check
      changed_when: false
      failed_when: false

    - name: Assert impacket regsecrets module is available
      ansible.builtin.assert:
        that:
          - privesc_tools_regsecrets_check.rc == 0
        fail_msg: "impacket.examples.regsecrets not found in impacket venv"
        success_msg: "impacket regsecrets module available in venv"

    - name: Check impacket is installed in krbrelayx venv
      ansible.builtin.command: "{{ privesc_tools_krbrelayx_install_dir }}/venv/bin/pip show impacket"
      register: privesc_tools_krbrelayx_impacket
      changed_when: false
      failed_when: false
      when: privesc_tools_install_krbrelayx | default(true)

    - name: Assert impacket is installed in krbrelayx venv
      ansible.builtin.assert:
        that:
          - privesc_tools_krbrelayx_impacket.rc == 0
        fail_msg: "impacket is not installed in krbrelayx venv (required for printerbug.py)"
        success_msg: "impacket is installed in krbrelayx venv"
      when: privesc_tools_install_krbrelayx | default(true)

    # lsassy verification
    - name: Check lsassy symlink exists
      ansible.builtin.stat:
        path: /usr/local/bin/lsassy
      register: privesc_tools_lsassy_symlink
      when: privesc_tools_install_lsassy | default(true)

    - name: Assert lsassy symlink exists
      ansible.builtin.assert:
        that:
          - privesc_tools_lsassy_symlink.stat.exists
        fail_msg: "lsassy symlink not created at /usr/local/bin/lsassy"
        success_msg: "lsassy is available at /usr/local/bin/lsassy"
      when: privesc_tools_install_lsassy | default(true)

    - name: Check lsassy is executable
      ansible.builtin.command: lsassy --help
      register: privesc_tools_lsassy_help
      changed_when: false
      failed_when: false
      when: privesc_tools_install_lsassy | default(true)

    - name: Assert lsassy is functional
      ansible.builtin.assert:
        that:
          - privesc_tools_lsassy_help.rc == 0
        fail_msg: "lsassy is not functional"
        success_msg: "lsassy is functional"
      when: privesc_tools_install_lsassy | default(true)

    # Base directory verification
    - name: Check privesc tools base directory exists
      ansible.builtin.stat:
        path: "{{ privesc_tools_base_dir }}"
      register: privesc_tools_base_dir_stat

    - name: Assert base directory exists
      ansible.builtin.assert:
        that:
          - privesc_tools_base_dir_stat.stat.exists
          - privesc_tools_base_dir_stat.stat.isdir
        fail_msg: "Base directory {{ privesc_tools_base_dir }} does not exist"
        success_msg: "Base directory {{ privesc_tools_base_dir }} exists"

    # zerologon verification
    - name: Check zerologon is cloned
      ansible.builtin.stat:
        path: "{{ privesc_tools_zerologon_install_dir }}/cve-2020-1472-exploit.py"
      register: privesc_tools_zerologon_stat
      when: privesc_tools_install_zerologon | default(true)

    - name: Assert zerologon exists
      ansible.builtin.assert:
        that:
          - privesc_tools_zerologon_stat.stat.exists
        fail_msg: "zerologon was not cloned to {{ privesc_tools_zerologon_install_dir }}"
        success_msg: "zerologon is available at {{ privesc_tools_zerologon_install_dir }}"
      when: privesc_tools_install_zerologon | default(true)

    - name: Check zerologon wrapper script exists
      ansible.builtin.stat:
        path: /usr/local/bin/zerologon
      register: privesc_tools_zerologon_wrapper
      when: privesc_tools_install_zerologon | default(true)

    - name: Assert zerologon wrapper is available
      ansible.builtin.assert:
        that:
          - privesc_tools_zerologon_wrapper.stat.exists
          - privesc_tools_zerologon_wrapper.stat.executable
        fail_msg: "zerologon wrapper not created at /usr/local/bin/zerologon"
        success_msg: "zerologon wrapper is available at /usr/local/bin/zerologon"
      when: privesc_tools_install_zerologon | default(true)

    # Certipy verification (AD CS abuse)
    - name: Check certipy wrapper script exists at /usr/local/bin
      ansible.builtin.stat:
        path: /usr/local/bin/certipy
      register: privesc_tools_certipy_wrapper
      when: privesc_tools_install_certipy | default(true)

    - name: Assert certipy wrapper script is executable
      ansible.builtin.assert:
        that:
          - privesc_tools_certipy_wrapper.stat.exists
          - privesc_tools_certipy_wrapper.stat.executable
          - privesc_tools_certipy_wrapper.stat.mode == '0755'
        fail_msg: >-
          /usr/local/bin/certipy missing, non-executable, or wrong mode
          (exists={{ privesc_tools_certipy_wrapper.stat.exists }},
          exec={{ privesc_tools_certipy_wrapper.stat.executable | default(false) }},
          mode={{ privesc_tools_certipy_wrapper.stat.mode | default('n/a') }})
        success_msg: "/usr/local/bin/certipy present with mode 0755"
      when: privesc_tools_install_certipy | default(true)

    - name: Verify /usr/bin/certipy symlinks to /usr/local/bin/certipy
      ansible.builtin.stat:
        path: /usr/bin/certipy
        follow: false
      register: privesc_tools_certipy_symlink
      when: privesc_tools_install_certipy | default(true)

    - name: Assert /usr/bin/certipy is a symlink pointing at /usr/local/bin/certipy
      ansible.builtin.assert:
        that:
          - privesc_tools_certipy_symlink.stat.exists
          - privesc_tools_certipy_symlink.stat.islnk
          - privesc_tools_certipy_symlink.stat.lnk_target == '/usr/local/bin/certipy'
        fail_msg: >-
          /usr/bin/certipy is not the expected symlink to /usr/local/bin/certipy
          (islnk={{ privesc_tools_certipy_symlink.stat.islnk | default(false) }},
          target='{{ privesc_tools_certipy_symlink.stat.lnk_target | default('') }}')
        success_msg: "/usr/bin/certipy correctly symlinks to /usr/local/bin/certipy"
      when: privesc_tools_install_certipy | default(true)

    - name: Functional smoke test — certipy --help
      ansible.builtin.command: /usr/bin/certipy --help
      register: privesc_tools_certipy_help
      changed_when: false
      failed_when: privesc_tools_certipy_help.rc != 0
      when: privesc_tools_install_certipy | default(true)

    - name: Assert certipy --help output looks sane
      ansible.builtin.assert:
        that:
          # `certipy` prints a subcommand table; `usage:` is the canonical
          # marker across the entire certipy-ad CLI (auth, cert, find, req,
          # relay, etc.), so it's a stable regression guard.
          - "'usage' in (privesc_tools_certipy_help.stdout | lower) or 'usage' in (privesc_tools_certipy_help.stderr | lower)"
        fail_msg: >-
          certipy --help did not produce recognizable CLI output
          (stdout={{ privesc_tools_certipy_help.stdout }})
        success_msg: "certipy CLI is functional"
      when: privesc_tools_install_certipy | default(true)

    # krbrelayx auxiliary wrappers (addspn, dnstool) — installed alongside
    # krbrelayx/printerbug by the same loop in linux.yml. If the loop breaks
    # for any reason (e.g. wrong item shape), catching one wrapper isn't
    # enough; verify all four dispatched by the loop.
    - name: Check addspn wrapper exists
      ansible.builtin.stat:
        path: /usr/local/bin/addspn
      register: privesc_tools_addspn_wrapper
      when: privesc_tools_install_krbrelayx | default(true)

    - name: Check dnstool wrapper exists
      ansible.builtin.stat:
        path: /usr/local/bin/dnstool
      register: privesc_tools_dnstool_wrapper
      when: privesc_tools_install_krbrelayx | default(true)

    - name: Assert addspn and dnstool wrappers are executable
      ansible.builtin.assert:
        that:
          - privesc_tools_addspn_wrapper.stat.exists
          - privesc_tools_addspn_wrapper.stat.executable
          - privesc_tools_dnstool_wrapper.stat.exists
          - privesc_tools_dnstool_wrapper.stat.executable
        fail_msg: >-
          krbrelayx auxiliary wrappers missing or non-executable
          (addspn exists={{ privesc_tools_addspn_wrapper.stat.exists }},
          dnstool exists={{ privesc_tools_dnstool_wrapper.stat.exists }})
        success_msg: "krbrelayx auxiliary wrappers (addspn, dnstool) are executable"
      when: privesc_tools_install_krbrelayx | default(true)

    # KrbRelayUp shim — the linux.yml install writes a bash wrapper that
    # shells out via mono to the .exe. A raw shim without the mono runtime
    # will error at exec time, so also verify mono-runtime is present.
    - name: Check KrbRelayUp shim exists at /usr/local/bin
      ansible.builtin.stat:
        path: /usr/local/bin/KrbRelayUp
      register: privesc_tools_krbrelayup_shim
      when: privesc_tools_install_krbrelayup | default(true)

    - name: Assert KrbRelayUp shim is an executable bash wrapper
      ansible.builtin.assert:
        that:
          - privesc_tools_krbrelayup_shim.stat.exists
          - privesc_tools_krbrelayup_shim.stat.executable
        fail_msg: >-
          /usr/local/bin/KrbRelayUp missing or non-executable
          (exists={{ privesc_tools_krbrelayup_shim.stat.exists }},
          exec={{ privesc_tools_krbrelayup_shim.stat.executable | default(false) }})
        success_msg: "/usr/local/bin/KrbRelayUp shim present"
      when: privesc_tools_install_krbrelayup | default(true)

    - name: Verify mono-runtime is installed (KrbRelayUp shim depends on it)
      ansible.builtin.command: which mono
      register: privesc_tools_mono_check
      changed_when: false
      failed_when: false
      when:
        - privesc_tools_install_krbrelayup | default(true)
        - ansible_facts['os_family'] == 'Debian'

    - name: Assert mono is on PATH so KrbRelayUp shim can dispatch
      ansible.builtin.assert:
        that:
          - privesc_tools_mono_check.rc == 0
        fail_msg: >-
          mono is not on PATH — the /usr/local/bin/KrbRelayUp shim will fail
          at exec time with 'mono: command not found'
        success_msg: "mono is on PATH at {{ privesc_tools_mono_check.stdout }}"
      when:
        - privesc_tools_install_krbrelayup | default(true)
        - ansible_facts['os_family'] == 'Debian'

    # pygpoabuse verification
    - name: Check pygpoabuse is installed
      ansible.builtin.command: which pygpoabuse
      register: privesc_tools_pygpoabuse_check
      changed_when: false
      failed_when: false
      environment:
        PATH: "/root/.local/bin:{{ ansible_facts['env']['PATH'] }}"
      when: privesc_tools_install_pygpoabuse | default(true)

    - name: Assert pygpoabuse is available
      ansible.builtin.assert:
        that:
          - privesc_tools_pygpoabuse_check.rc == 0
        fail_msg: "pygpoabuse not found"
        success_msg: "pygpoabuse is installed"
      when: privesc_tools_install_pygpoabuse | default(true)

    - name: Display verification summary
      ansible.builtin.debug:
        msg:
          - "=== Privilege Escalation Tools Verification Complete ==="
          - "Base directory: {{ privesc_tools_base_dir }}"
          - "PrintSpoofer: {{ 'PASS' if privesc_tools_printspoofer_stat.stat.exists | default(false) else 'SKIP/FAIL' }}"
          - "GodPotato: {{ 'PASS' if privesc_tools_godpotato_stat.stat.exists | default(false) else 'SKIP/FAIL' }}"
          - "WinPEAS: {{ 'PASS' if privesc_tools_winpeas_stat.stat.exists | default(false) else 'SKIP/FAIL' }}"
          - "LinPEAS: {{ 'PASS' if privesc_tools_linpeas_stat.stat.exists | default(false) else 'SKIP/FAIL' }}"
          - "PowerUp: {{ 'PASS' if privesc_tools_powerup_stat.stat.exists | default(false) else 'SKIP/FAIL' }}"
          - "PowerUpSQL: {{ 'PASS' if privesc_tools_powerupsql_stat.stat.exists | default(false) else 'SKIP/FAIL' }}"
          - "noPac: {{ 'PASS' if privesc_tools_nopac_stat.stat.exists | default(false) else 'SKIP/FAIL' }}"
          - "PrintNightmare: {{ 'PASS' if privesc_tools_printnightmare_stat.stat.exists | default(false) else 'SKIP/FAIL' }}"
          - "zerologon: {{ 'PASS' if privesc_tools_zerologon_stat.stat.exists | default(false) else 'SKIP/FAIL' }}"
          - "pygpoabuse: {{ 'PASS' if privesc_tools_pygpoabuse_check.rc | default(1) == 0 else 'SKIP/FAIL' }}"

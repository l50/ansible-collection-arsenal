    dest: "{{ privesc_tools_printnightmare_install_dir }}"
    version: "{{ privesc_tools_printnightmare_version }}"
    force: true
  become: true
  when: privesc_tools_install_printnightmare

- name: Make PrintNightmare script executable
  ansible.builtin.file:
    path: "{{ privesc_tools_printnightmare_install_dir }}/CVE-2021-1675.py"
    mode: '0755'
  become: true
  when: privesc_tools_install_printnightmare

- name: Create symlink for PrintNightmare
  ansible.builtin.file:
    src: "{{ privesc_tools_printnightmare_install_dir }}/CVE-2021-1675.py"
    dest: "/usr/local/bin/printnightmare"
    state: link
  become: true
  when: privesc_tools_install_printnightmare

# krbrelayx - needed for unconstrained delegation coercion (printerbug)
- name: Clone krbrelayx from GitHub
  ansible.builtin.git:
    repo: "{{ privesc_tools_krbrelayx_repo }}"
    dest: "{{ privesc_tools_krbrelayx_install_dir }}"
    version: "{{ privesc_tools_krbrelayx_version }}"
    update: true
  become: true
  register: privesc_tools_krbrelayx_clone
  when:
    - ansible_facts['os_family'] == 'Debian'
    - privesc_tools_install_krbrelayx

- name: Configure git to ignore filemode changes in krbrelayx repo  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: git config core.filemode false
    chdir: "{{ privesc_tools_krbrelayx_install_dir }}"
  become: true
  changed_when: false
  when:
    - ansible_facts['os_family'] == 'Debian'
    - privesc_tools_install_krbrelayx
    - privesc_tools_krbrelayx_clone is not skipped

- name: Create virtual environment for krbrelayx
  ansible.builtin.command:
    cmd: python3 -m venv {{ privesc_tools_krbrelayx_install_dir }}/venv
  become: true
  args:
    creates: "{{ privesc_tools_krbrelayx_install_dir }}/venv"
  when:
    - ansible_facts['os_family'] == 'Debian'
    - privesc_tools_install_krbrelayx

- name: Install krbrelayx dependencies in venv
  ansible.builtin.pip:
    name:
      - dnspython
      - ldap3
      - impacket
    virtualenv: "{{ privesc_tools_krbrelayx_install_dir }}/venv"
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - privesc_tools_install_krbrelayx

- name: Create wrapper scripts for krbrelayx tools
  ansible.builtin.copy:
    content: |
      #!/bin/bash
      exec {{ privesc_tools_krbrelayx_install_dir }}/venv/bin/python \
           {{ privesc_tools_krbrelayx_install_dir }}/{{ item.src }} "$@"
    dest: "/usr/local/bin/{{ item.dest }}"
    mode: '0755'
  become: true
  loop:
    - { src: "krbrelayx.py", dest: "krbrelayx" }
    - { src: "addspn.py", dest: "addspn" }
    - { src: "dnstool.py", dest: "dnstool" }
    - { src: "printerbug.py", dest: "printerbug" }
  when:
    - ansible_facts['os_family'] == 'Debian'
    - privesc_tools_install_krbrelayx


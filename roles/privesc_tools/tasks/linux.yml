---
- name: Wait for apt locks to be released
  ansible.builtin.shell: |
    while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || \
          fuser /var/lib/dpkg/lock >/dev/null 2>&1 || \
          fuser /var/cache/apt/archives/lock >/dev/null 2>&1; do
      echo "Waiting for apt locks to be released..."
      sleep 2
    done
  become: true
  changed_when: false
  when: ansible_facts['os_family'] == 'Debian'

- name: Set DEBIAN_FRONTEND to noninteractive
  ansible.builtin.lineinfile:
    path: /etc/environment
    line: 'DEBIAN_FRONTEND=noninteractive'
    create: true
    mode: '0644'
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true
  when:
    - privesc_tools_update_cache
    - ansible_facts['os_family'] == 'Debian'

- name: Install Kali-specific privesc dependencies
  ansible.builtin.apt:
    name: "{{ privesc_tools_kali_packages }}"
    state: present
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] == 'Kali'

- name: Install Ubuntu-compatible privesc dependencies
  ansible.builtin.apt:
    name: "{{ privesc_tools_ubuntu_packages }}"
    state: present
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] != 'Kali'

- name: Install unzip for extracting archives
  ansible.builtin.apt:
    name: unzip
    state: present
    update_cache: true
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Create base privesc tools directory
  ansible.builtin.file:
    path: "{{ privesc_tools_base_dir }}"
    state: directory
    mode: '0755'
  become: true

# Impacket - required for delegation, ticket, and MSSQL tools
- name: Install Impacket from source
  ansible.builtin.include_tasks: impacket_source.yml
  when:
    - ansible_facts['os_family'] == 'Debian'
    - privesc_tools_install_impacket
    - privesc_tools_impacket_from_source

- name: Install Certipy via pipx
  ansible.builtin.include_tasks: certipy_venv.yml
  when:
    - ansible_facts['os_family'] == 'Debian'
    - privesc_tools_install_certipy

- name: Install lsassy via venv
  ansible.builtin.include_tasks: lsassy_venv.yml
  when:
    - ansible_facts['os_family'] == 'Debian'
    - privesc_tools_install_lsassy

- name: Create PrintSpoofer directory
  ansible.builtin.file:
    path: "{{ privesc_tools_printspoofer_install_dir }}"
    state: directory
    mode: '0755'
  become: true

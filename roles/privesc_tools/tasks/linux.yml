# noPac (CVE-2021-42287/CVE-2021-42278)
- name: Clone noPac from GitHub
  ansible.builtin.git:
    repo: "{{ privesc_tools_nopac_repo }}"
    dest: "{{ privesc_tools_nopac_install_dir }}"
    version: "{{ privesc_tools_nopac_version }}"
    force: true
  become: true
  when: privesc_tools_install_nopac

- name: Create virtual environment for noPac
  ansible.builtin.command:
    cmd: python3 -m venv {{ privesc_tools_nopac_install_dir }}/venv
  become: true
  args:
    creates: "{{ privesc_tools_nopac_install_dir }}/venv"
  when: privesc_tools_install_nopac

- name: Install setuptools in noPac venv (provides pkg_resources)
  ansible.builtin.pip:
    # setuptools 81 dropped pkg_resources; impacket 0.9.24 still imports it.
    name: "setuptools<81"
    virtualenv: "{{ privesc_tools_nopac_install_dir }}/venv"
  become: true
  when: privesc_tools_install_nopac

- name: Install noPac dependencies in venv
  ansible.builtin.pip:
    requirements: "{{ privesc_tools_nopac_install_dir }}/requirements.txt"
    virtualenv: "{{ privesc_tools_nopac_install_dir }}/venv"
  become: true
  when: privesc_tools_install_nopac
  failed_when: false

- name: Create wrapper script for noPac
  ansible.builtin.copy:
    content: |
      #!/bin/bash
      exec {{ privesc_tools_nopac_install_dir }}/venv/bin/python \
           {{ privesc_tools_nopac_install_dir }}/noPac.py "$@"
    dest: /usr/local/bin/nopac
    mode: '0755'
  become: true
  when: privesc_tools_install_nopac


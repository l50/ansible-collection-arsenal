---
- name: Install certipy-ad in an isolated virtualenv
  ansible.builtin.pip:
    name: "{{ privesc_tools_certipy_package }}"
    virtualenv: "{{ privesc_tools_certipy_install_dir }}/venv"
    virtualenv_command: python3 -m venv
  become: true

- name: Create wrapper script for certipy
  ansible.builtin.copy:
    content: |
      #!/bin/bash
      exec {{ privesc_tools_certipy_install_dir }}/venv/bin/certipy "$@"
    dest: /usr/local/bin/certipy
    mode: '0755'
  become: true

- name: Symlink certipy into /usr/bin
  ansible.builtin.file:
    src: /usr/local/bin/certipy
    dest: /usr/bin/certipy
    state: link
    force: true
    follow: false
  become: true

---
- name: Install pygpoabuse in an isolated virtualenv
  ansible.builtin.pip:
    name: "git+{{ privesc_tools_pygpoabuse_repo }}"
    virtualenv: "{{ privesc_tools_pygpoabuse_install_dir }}/venv"
    virtualenv_command: python3 -m venv
  become: true

- name: Create wrapper script for pygpoabuse
  ansible.builtin.copy:
    content: |
      #!/bin/bash
      exec {{ privesc_tools_pygpoabuse_install_dir }}/venv/bin/pygpoabuse "$@"
    dest: /usr/local/bin/pygpoabuse
    mode: '0755'
  become: true

- name: Symlink pygpoabuse into /usr/bin
  ansible.builtin.file:
    src: /usr/local/bin/pygpoabuse
    dest: /usr/bin/pygpoabuse
    state: link
    force: true
    follow: false
  become: true

---
- name: Wait for apt locks to be released
  ansible.builtin.shell: |
    while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || \
          fuser /var/lib/dpkg/lock >/dev/null 2>&1 || \
          fuser /var/cache/apt/archives/lock >/dev/null 2>&1; do
      echo "Waiting for apt locks to be released..."
      sleep 2
    done
  become: true
  changed_when: false
  when: ansible_facts['os_family'] == 'Debian'

- name: Set DEBIAN_FRONTEND to noninteractive
  ansible.builtin.lineinfile:
    path: /etc/environment
    line: 'DEBIAN_FRONTEND=noninteractive'
    create: true
    mode: '0644'
  become: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true
  when:
    - lateral_movement_tools_update_cache
    - ansible_facts['os_family'] == 'Debian'

- name: Install Kali-specific lateral movement tools (includes evil-winrm from apt)
  ansible.builtin.apt:
    name: "{{ lateral_movement_tools_kali_packages }}"
    state: present
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] == 'Kali'

- name: Install Ubuntu-compatible dependencies
  ansible.builtin.apt:
    name: "{{ lateral_movement_tools_ubuntu_packages }}"
    state: present
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] != 'Kali'

- name: Check xfreerdp and xfreerdp3 availability
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /usr/bin/xfreerdp
    - /usr/bin/xfreerdp3
  register: lateral_movement_tools_xfreerdp_stats
  when:
    - ansible_facts['os_family'] == 'Debian'
    - lateral_movement_tools_install_xfreerdp

- name: Create xfreerdp symlink to xfreerdp3 when needed
  ansible.builtin.file:
    src: /usr/bin/xfreerdp3
    dest: /usr/bin/xfreerdp
    state: link
    force: true
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - lateral_movement_tools_install_xfreerdp
    - lateral_movement_tools_xfreerdp_stats.results[0].stat.exists is not defined or not lateral_movement_tools_xfreerdp_stats.results[0].stat.exists
    - lateral_movement_tools_xfreerdp_stats.results[1].stat.exists | default(false)

# Verify build tools are available before gem install
- name: Verify gcc is available for native gem extensions
  ansible.builtin.command: gcc --version
  register: lateral_movement_tools_gcc_check
  changed_when: false
  failed_when: lateral_movement_tools_gcc_check.rc != 0
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] != 'Kali'
    - lateral_movement_tools_install_evil_winrm

- name: Verify libffi-dev is installed
  ansible.builtin.command: dpkg -s libffi-dev
  register: lateral_movement_tools_libffi_check
  changed_when: false
  failed_when: lateral_movement_tools_libffi_check.rc != 0
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] != 'Kali'
    - lateral_movement_tools_install_evil_winrm

- name: Verify ruby-dev is installed
  ansible.builtin.command: dpkg -s ruby-dev
  register: lateral_movement_tools_rubydev_check
  changed_when: false
  failed_when: lateral_movement_tools_rubydev_check.rc != 0
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] != 'Kali'
    - lateral_movement_tools_install_evil_winrm

- name: Check ffi.h header file exists
  ansible.builtin.stat:
    path: /usr/include/ffi.h
  register: lateral_movement_tools_ffi_header
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] != 'Kali'
    - lateral_movement_tools_install_evil_winrm

- name: Check alternate ffi.h location
  ansible.builtin.shell: set -o pipefail && find /usr -name 'ffi.h' 2>/dev/null | head -5
  args:
    executable: /bin/bash
  register: lateral_movement_tools_ffi_find
  changed_when: false
  failed_when: false
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] != 'Kali'
    - lateral_movement_tools_install_evil_winrm

- name: Check pkg-config for libffi
  ansible.builtin.command: pkg-config --cflags --libs libffi
  register: lateral_movement_tools_pkgconfig
  changed_when: false
  failed_when: false
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] != 'Kali'
    - lateral_movement_tools_install_evil_winrm

- name: Display build environment for debugging
  ansible.builtin.debug:
    msg:
      - "GCC version: {{ lateral_movement_tools_gcc_check.stdout_lines[0] | default('N/A') }}"
      - "libffi-dev status: {{ 'installed' if lateral_movement_tools_libffi_check.rc == 0 else 'MISSING' }}"
      - "ruby-dev status: {{ 'installed' if lateral_movement_tools_rubydev_check.rc == 0 else 'MISSING' }}"
      - "ffi.h exists at /usr/include/ffi.h: {{ lateral_movement_tools_ffi_header.stat.exists | default(false) }}"
      - "ffi.h locations found: {{ lateral_movement_tools_ffi_find.stdout_lines | default([]) }}"
      - "pkg-config libffi: {{ lateral_movement_tools_pkgconfig.stdout | default('FAILED: ' + lateral_movement_tools_pkgconfig.stderr | default('unknown')) }}"
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] != 'Kali'
    - lateral_movement_tools_install_evil_winrm

# Force reinstall gcc packages - the dpkg database may say installed but files are missing
# Use apt-get install --reinstall to force file restoration
- name: Force reinstall gcc packages to restore missing libgcc files
  ansible.builtin.shell: |
    set -e
    apt-get update
    apt-get install --reinstall -y gcc cpp libgcc-s1 build-essential libc6-dev
  args:
    executable: /bin/bash
  become: true
  changed_when: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] != 'Kali'
    - lateral_movement_tools_install_evil_winrm

# Test that gcc can actually compile
- name: Test gcc can compile a simple program
  ansible.builtin.shell: |
    set -e
    echo 'int main() { return 0; }' > /tmp/test_gcc.c
    gcc -o /tmp/test_gcc /tmp/test_gcc.c
    rm -f /tmp/test_gcc /tmp/test_gcc.c
  args:
    executable: /bin/bash
  register: lateral_movement_tools_gcc_compile_test
  changed_when: false
  failed_when: lateral_movement_tools_gcc_compile_test.rc != 0
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] != 'Kali'
    - lateral_movement_tools_install_evil_winrm

# Fix multiarch header location for ffi gem build
- name: Create symlink for ffi.h in standard include path
  ansible.builtin.file:
    src: "/usr/include/{{ ansible_facts['architecture'] }}-linux-gnu/ffi.h"
    dest: /usr/include/ffi.h
    state: link
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] != 'Kali'
    - lateral_movement_tools_install_evil_winrm
    - not lateral_movement_tools_ffi_header.stat.exists | default(false)

- name: Create symlink for ffitarget.h in standard include path
  ansible.builtin.file:
    src: "/usr/include/{{ ansible_facts['architecture'] }}-linux-gnu/ffitarget.h"
    dest: /usr/include/ffitarget.h
    state: link
  become: true
  failed_when: false
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] != 'Kali'
    - lateral_movement_tools_install_evil_winrm
    - not lateral_movement_tools_ffi_header.stat.exists | default(false)

- name: Install rubyzip gem for evil-winrm dependency
  community.general.gem:
    name: rubyzip
    version: "~> 2.0"
    state: present
    user_install: false
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - lateral_movement_tools_install_evil_winrm

- name: Install evil-winrm gem (Ubuntu only, Kali uses apt)
  community.general.gem:
    name: "{{ lateral_movement_tools_evil_winrm_gem }}"
    state: present
    user_install: false
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] != 'Kali'
    - lateral_movement_tools_install_evil_winrm

# `gem update` is skipped on Kali: evil-winrm ships via apt and Kali tracks
# CVE patches for net-imap/rexml/uri/zlib through its `ruby-*` debs. On
# AMI builders, `gem update` here also tends to SIGKILL (rc=-9) inside the
# Image Builder runner regardless of `--no-document`, so we keep it
# best-effort with `failed_when: false` and limit it to non-Kali Debian.
- name: Update vulnerable ruby gem dependencies (Ubuntu only - Kali patches via apt)
  ansible.builtin.command: gem update --no-document {{ item }}
  become: true
  changed_when: true
  failed_when: false
  loop:
    - net-imap
    - resolv
    - rexml
    - uri
    - zlib
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] != 'Kali'
    - lateral_movement_tools_install_evil_winrm

- name: Install pth-toolkit (Kali only - may not be available in all repos)
  ansible.builtin.apt:
    name: "{{ lateral_movement_tools_pth_toolkit_package }}"
    state: present
  become: true
  register: lateral_movement_tools_pth_toolkit_install
  failed_when: false
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] == 'Kali'
    - lateral_movement_tools_install_pth_toolkit

- name: Warn if pth-toolkit installation failed
  ansible.builtin.debug:
    msg: "pth-toolkit package not available in configured repos - skipping"
  when:
    - lateral_movement_tools_pth_toolkit_install is defined
    - lateral_movement_tools_pth_toolkit_install.failed | default(false)

- name: Install Impacket from source for lateral movement tools
  ansible.builtin.include_tasks: impacket_source.yml
  when:
    - ansible_facts['os_family'] == 'Debian'
    - lateral_movement_tools_install_impacket
    - lateral_movement_tools_impacket_from_source

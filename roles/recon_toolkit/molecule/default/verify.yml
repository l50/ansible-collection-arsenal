---
- name: Verify
  hosts: all
  gather_facts: true

  tasks:
    - name: Include default variables
      ansible.builtin.include_vars:
        file: "../../defaults/main.yml"

    - name: Set recon_toolkit user home directory
      ansible.builtin.include_tasks: "../../tasks/recon_toolkit_get_user_home.yml"

    - name: Set tool PATH for verification
      ansible.builtin.set_fact:
        recon_toolkit_verify_path: "{{ recon_toolkit_user_home }}/go/bin:{{ recon_toolkit_user_home }}/.local/bin:{{ recon_toolkit_user_home }}/.local/share/mise/shims:/usr/local/bin:/usr/bin:/bin"

    # ========================================================================
    # Core tools
    # ========================================================================

    - name: Verify core tools are installed
      ansible.builtin.command: "{{ item }} --version"
      register: recon_toolkit_core_check
      changed_when: false
      failed_when: false
      loop:
        - curl
        - jq
        - python3
        - git

    - name: Verify dig is installed
      ansible.builtin.command: dig -v
      register: recon_toolkit_dig_check
      changed_when: false
      failed_when: false

    - name: Verify openssl is installed
      ansible.builtin.command: openssl version
      register: recon_toolkit_openssl_check
      changed_when: false
      failed_when: false

    - name: Assert core tools are working
      ansible.builtin.assert:
        that:
          - item.rc == 0
        fail_msg: "{{ item.item }} is not properly installed"
        success_msg: "{{ item.item }} is installed"
      loop: "{{ recon_toolkit_core_check.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Assert dig is available
      ansible.builtin.assert:
        that:
          - recon_toolkit_dig_check.rc == 0
        fail_msg: "dig is not properly installed"
        success_msg: "dig is installed"

    - name: Assert openssl is available
      ansible.builtin.assert:
        that:
          - recon_toolkit_openssl_check.rc == 0
        fail_msg: "openssl is not properly installed"
        success_msg: "openssl is installed"

    # ========================================================================
    # Subdomain Enumeration
    # ========================================================================

    - name: Verify subfinder is installed
      ansible.builtin.command: which subfinder
      environment:

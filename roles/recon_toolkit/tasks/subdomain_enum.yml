    go install -v github.com/d3mondev/puredns/v2@latest
  args:
    creates: "{{ recon_toolkit_user_home }}/go/bin/puredns"
    executable: /bin/bash
  become: true
  become_user: "{{ recon_toolkit_username }}"
  environment:
    HOME: "{{ recon_toolkit_user_home }}"
    USER: "{{ recon_toolkit_username }}"
    ASDF_DATA_DIR: "{{ recon_toolkit_user_home }}/.asdf"
  when: recon_toolkit_install_puredns | bool


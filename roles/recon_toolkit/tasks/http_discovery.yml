# --- rustscan (fast port scanner) ---
- name: Install rustscan
  when:
    - recon_toolkit_install_rustscan | bool
  block:
    - name: Check if rustscan is already installed
      ansible.builtin.command: rustscan --version
      register: recon_toolkit_rustscan_installed
      changed_when: false
      failed_when: false

    - name: Set rustscan archive name based on architecture
      ansible.builtin.set_fact:
        recon_toolkit_rustscan_archive: "{{ recon_toolkit_rustscan_archives[ansible_facts['architecture']] }}"
      when: recon_toolkit_rustscan_installed.rc != 0

    - name: Download rustscan binary archive
      ansible.builtin.get_url:
        url: "https://github.com/bee-san/RustScan/releases/download/{{ recon_toolkit_rustscan_version }}/{{ recon_toolkit_rustscan_archive }}"
        dest: "/tmp/{{ recon_toolkit_rustscan_archive }}"
        mode: '0644'
      become: true
      when: recon_toolkit_rustscan_installed.rc != 0

    - name: Create rustscan temp extraction directory
      ansible.builtin.file:
        path: /tmp/rustscan_extract
        state: directory
        mode: '0755'
      become: true
      when: recon_toolkit_rustscan_installed.rc != 0

    - name: Extract rustscan archive (zip layer)
      ansible.builtin.unarchive:
        src: "/tmp/{{ recon_toolkit_rustscan_archive }}"
        dest: /tmp/rustscan_extract
        remote_src: true
      become: true
      when: recon_toolkit_rustscan_installed.rc != 0

    - name: Find nested tar.gz in extracted files (x86_64 has zip-wrapped tar.gz)
      ansible.builtin.find:
        paths: /tmp/rustscan_extract
        patterns: "*.tar.gz"
        recurse: true
        file_type: file
      register: recon_toolkit_rustscan_nested_tar
      when: recon_toolkit_rustscan_installed.rc != 0

    - name: Extract nested tar.gz if present
      ansible.builtin.unarchive:
        src: "{{ recon_toolkit_rustscan_nested_tar.files[0].path }}"
        dest: /tmp/rustscan_extract
        remote_src: true
      become: true
      when:
        - recon_toolkit_rustscan_installed.rc != 0
        - recon_toolkit_rustscan_nested_tar.files | length > 0

    - name: Find rustscan binary in extracted files
      ansible.builtin.find:
        paths: /tmp/rustscan_extract
        patterns: "rustscan"
        recurse: true
        file_type: file
      register: recon_toolkit_rustscan_binary
      when: recon_toolkit_rustscan_installed.rc != 0

    - name: Install rustscan binary to /usr/local/bin
      ansible.builtin.copy:
        src: "{{ recon_toolkit_rustscan_binary.files[0].path }}"
        dest: /usr/local/bin/rustscan
        mode: '0755'
        remote_src: true
      become: true
      when:
        - recon_toolkit_rustscan_installed.rc != 0
        - recon_toolkit_rustscan_binary.files | length > 0

    - name: Clean up rustscan temp files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      become: true
      loop:
        - "/tmp/{{ recon_toolkit_rustscan_archive | default('') }}"
        - /tmp/rustscan_extract


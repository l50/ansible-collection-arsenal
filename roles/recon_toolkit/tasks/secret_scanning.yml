---
# ============================================================================
# Secret Scanning Tools
# ============================================================================

# --- trufflehog (secret/credential scanning) ---
- name: Install trufflehog
  when: recon_toolkit_install_trufflehog | bool
  block:
    - name: Check if trufflehog is already installed
      ansible.builtin.command: trufflehog --version
      register: recon_toolkit_trufflehog_check
      changed_when: false
      failed_when: false

    - name: Install trufflehog via install script
      ansible.builtin.shell: |
        set -o pipefail
        curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
      args:
        executable: /bin/bash
      become: true
      when: recon_toolkit_trufflehog_check.rc != 0
      changed_when: recon_toolkit_trufflehog_check.rc != 0

# --- gitleaks (git secret scanning) ---
- name: Install gitleaks
  ansible.builtin.shell: |
    set -o pipefail
    export MISE_DATA_DIR="{{ recon_toolkit_user_home }}/.local/share/mise"
    export PATH="/usr/local/bin:${MISE_DATA_DIR}/shims:$PATH"
    export GOPATH="{{ recon_toolkit_user_home }}/go"
    go install -v github.com/zricethezav/gitleaks/v8@latest
  args:
    creates: "{{ recon_toolkit_user_home }}/go/bin/gitleaks"
    executable: /bin/bash
  become: true
  become_user: "{{ recon_toolkit_username }}"
  environment:
    HOME: "{{ recon_toolkit_user_home }}"
    USER: "{{ recon_toolkit_username }}"
    MISE_DATA_DIR: "{{ recon_toolkit_user_home }}/.local/share/mise"
    MISE_CONFIG_DIR: "{{ recon_toolkit_user_home }}/.config/mise"
  when: recon_toolkit_install_gitleaks | bool

# --- noseyparker (secret/credential scanning) ---
- name: Install noseyparker
  when:
    - recon_toolkit_install_noseyparker | bool
  block:
    - name: Check if noseyparker is already installed
      ansible.builtin.command: noseyparker --version
      register: recon_toolkit_noseyparker_installed
      changed_when: false
      failed_when: false

    - name: Set noseyparker architecture string
      ansible.builtin.set_fact:
        recon_toolkit_noseyparker_arch: >-
          {{ 'x86_64' if ansible_facts['architecture'] == 'x86_64'
          else 'aarch64' }}
      when: recon_toolkit_noseyparker_installed.rc != 0

    - name: Set noseyparker download URL
      ansible.builtin.set_fact:
        recon_toolkit_noseyparker_url: >-
          https://github.com/praetorian-inc/noseyparker/releases/download/v{{
          recon_toolkit_noseyparker_version }}/noseyparker-v{{
          recon_toolkit_noseyparker_version }}-{{
          recon_toolkit_noseyparker_arch }}-unknown-linux-gnu.tar.gz
      when: recon_toolkit_noseyparker_installed.rc != 0

    - name: Download noseyparker binary archive
      ansible.builtin.get_url:
        url: "{{ recon_toolkit_noseyparker_url }}"
        dest: "/tmp/noseyparker.tar.gz"
        mode: '0644'
      become: true
      when: recon_toolkit_noseyparker_installed.rc != 0

    - name: Create noseyparker temp extraction directory
      ansible.builtin.file:
        path: /tmp/noseyparker_extract
        state: directory
        mode: '0755'
      become: true
      when: recon_toolkit_noseyparker_installed.rc != 0

    - name: Extract noseyparker archive
      ansible.builtin.unarchive:
        src: /tmp/noseyparker.tar.gz
        dest: /tmp/noseyparker_extract
        remote_src: true
      become: true
      when: recon_toolkit_noseyparker_installed.rc != 0

    - name: Find noseyparker binary in extracted files
      ansible.builtin.find:
        paths: /tmp/noseyparker_extract
        patterns: "noseyparker"
        recurse: true
        file_type: file
      register: recon_toolkit_noseyparker_binary
      when: recon_toolkit_noseyparker_installed.rc != 0

    - name: Install noseyparker binary to /usr/local/bin
      ansible.builtin.copy:
        src: "{{ recon_toolkit_noseyparker_binary.files[0].path }}"
        dest: /usr/local/bin/noseyparker
        mode: '0755'
        remote_src: true
      become: true
      when:
        - recon_toolkit_noseyparker_installed.rc != 0
        - recon_toolkit_noseyparker_binary.files | length > 0

    - name: Clean up noseyparker temp files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      become: true
      loop:
        - /tmp/noseyparker.tar.gz
        - /tmp/noseyparker_extract

# --- git-hound (git secret hunting) ---
- name: Install git-hound
  ansible.builtin.shell: |
    set -o pipefail
    export MISE_DATA_DIR="{{ recon_toolkit_user_home }}/.local/share/mise"
    export PATH="/usr/local/bin:${MISE_DATA_DIR}/shims:$PATH"
    export GOPATH="{{ recon_toolkit_user_home }}/go"
    go install -v github.com/tillson/git-hound@latest
  args:
    creates: "{{ recon_toolkit_user_home }}/go/bin/git-hound"
    executable: /bin/bash
  become: true
  become_user: "{{ recon_toolkit_username }}"
  environment:
    HOME: "{{ recon_toolkit_user_home }}"
    USER: "{{ recon_toolkit_username }}"
    MISE_DATA_DIR: "{{ recon_toolkit_user_home }}/.local/share/mise"
    MISE_CONFIG_DIR: "{{ recon_toolkit_user_home }}/.config/mise"
  when: recon_toolkit_install_git_hound | bool

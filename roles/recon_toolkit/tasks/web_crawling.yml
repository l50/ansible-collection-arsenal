# --- js-beautify (JavaScript beautifier/deobfuscator) ---
- name: Install js-beautify
  ansible.builtin.shell: |
    set -o pipefail
    export MISE_DATA_DIR="{{ recon_toolkit_user_home }}/.local/share/mise"
    export PATH="/usr/local/bin:${MISE_DATA_DIR}/shims:$PATH"
    npm install -g js-beautify
  args:
    creates: >-
      {{ recon_toolkit_user_home }}/.local/share/mise/installs/node/{{
      (recon_toolkit_mise_plugins | selectattr('name', 'equalto', 'node') | first).version
      }}/bin/js-beautify
    executable: /bin/bash
  become: true
  become_user: "{{ recon_toolkit_username }}"
  environment:
    HOME: "{{ recon_toolkit_user_home }}"
    USER: "{{ recon_toolkit_username }}"
    MISE_DATA_DIR: "{{ recon_toolkit_user_home }}/.local/share/mise"
    MISE_CONFIG_DIR: "{{ recon_toolkit_user_home }}/.config/mise"
  when: recon_toolkit_install_jsbeautify | bool

# --- LinkFinder (JS endpoint extraction) ---
- name: Install LinkFinder
  when: recon_toolkit_install_linkfinder | bool
  block:
    - name: Clone LinkFinder repository
      ansible.builtin.git:
        repo: "{{ recon_toolkit_linkfinder_repo }}"
        dest: "{{ recon_toolkit_linkfinder_install_dir }}"
        version: master
        force: true
      become: true

    - name: Install LinkFinder Python dependencies
      ansible.builtin.pip:
        requirements: "{{ recon_toolkit_linkfinder_install_dir }}/requirements.txt"
        state: present
        break_system_packages: true
      become: true

    - name: Create LinkFinder wrapper in /usr/local/bin
      ansible.builtin.copy:
        content: |
          #!/bin/bash
          python3 {{ recon_toolkit_linkfinder_install_dir }}/linkfinder.py "$@"
        dest: /usr/local/bin/linkfinder
        mode: '0755'
      become: true


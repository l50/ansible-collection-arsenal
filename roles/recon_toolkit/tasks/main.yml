---
- name: Set recon_toolkit user home directory
  ansible.builtin.include_tasks: recon_toolkit_get_user_home.yml

- name: Install required packages for recon_toolkit
  ansible.builtin.include_role:
    name: cowdogmoo.workstation.package_management
  vars:
    package_management_common_install_packages: "{{ recon_toolkit_common_install_packages }}"
    package_management_debian_specific_packages: "{{ recon_toolkit_debian_packages }}"

- name: Create user
  ansible.builtin.include_role:
    name: cowdogmoo.workstation.user_setup
  vars:
    user_setup_default_users:
      - username: "{{ recon_toolkit_username }}"
        usergroup: "{{ recon_toolkit_usergroup }}"
        shell: "{{ recon_toolkit_shell }}"
        sudo: true

- name: Ensure home directory exists for recon_toolkit user
  ansible.builtin.file:
    path: "{{ recon_toolkit_user_home }}"
    state: directory
    owner: "{{ recon_toolkit_username }}"
    group: "{{ recon_toolkit_usergroup }}"
    mode: '0750'
  become: true

- name: Check if .bashrc exists for recon_toolkit user
  ansible.builtin.stat:
    path: "{{ recon_toolkit_user_home }}/.bashrc"
  register: recon_toolkit_bashrc_stat
  become: true

- name: Ensure .bashrc exists for recon_toolkit user
  ansible.builtin.file:
    path: "{{ recon_toolkit_user_home }}/.bashrc"
    state: touch
    owner: "{{ recon_toolkit_username }}"
    group: "{{ recon_toolkit_usergroup }}"
    mode: '0644'
  become: true
  when: not recon_toolkit_bashrc_stat.stat.exists

- name: Check if mise is installed for recon_toolkit user
  ansible.builtin.stat:
    path: "{{ recon_toolkit_user_home }}/.local/share/mise"
  register: recon_toolkit_mise_installed

- name: Check if mise binary is installed
  ansible.builtin.stat:
    path: "/usr/local/bin/mise"
  register: recon_toolkit_mise_binary_installed

- name: Install mise and associated plugins for recon_toolkit user
  ansible.builtin.include_role:
    name: cowdogmoo.workstation.mise
  vars:
    mise_username: "{{ recon_toolkit_username }}"
    mise_usergroup: "{{ recon_toolkit_usergroup }}"
    mise_shell: "{{ recon_toolkit_shell }}"
    mise_plugins: "{{ recon_toolkit_mise_plugins }}"
    mise_user_home: "{{ recon_toolkit_user_home }}"
    mise_data_dir: "{{ recon_toolkit_user_home }}/.local/share/mise"
    mise_config_dir: "{{ recon_toolkit_user_home }}/.config/mise"
    mise_bin_dir: "/usr/local/bin"
  when: not recon_toolkit_mise_installed.stat.exists or not recon_toolkit_mise_binary_installed.stat.exists

- name: Ensure golang is installed for user
  ansible.builtin.shell: |
    export MISE_DATA_DIR="{{ recon_toolkit_user_home }}/.local/share/mise"
    export PATH="/usr/local/bin:${MISE_DATA_DIR}/shims:$PATH"
    mise install go@{{ (recon_toolkit_mise_plugins | selectattr('name', 'equalto', 'go') | first).version }}
    mise use --global go@{{ (recon_toolkit_mise_plugins | selectattr('name', 'equalto', 'go') | first).version }}
    mise reshim
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ recon_toolkit_username }}"
  environment:
    HOME: "{{ recon_toolkit_user_home }}"
    USER: "{{ recon_toolkit_username }}"
    MISE_DATA_DIR: "{{ recon_toolkit_user_home }}/.local/share/mise"
    MISE_CONFIG_DIR: "{{ recon_toolkit_user_home }}/.config/mise"
  changed_when: false

- name: Add recon toolkit paths to user's bashrc
  ansible.builtin.blockinfile:
    path: "{{ recon_toolkit_user_home }}/.bashrc"
    block: |
      # Recon toolkit paths
      export GOPATH="{{ recon_toolkit_user_home }}/go"
      export MISE_DATA_DIR="{{ recon_toolkit_user_home }}/.local/share/mise"
      export PATH="{{ recon_toolkit_user_home }}/go/bin:{{ recon_toolkit_user_home }}/.local/bin:${MISE_DATA_DIR}/shims:$PATH"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - RECON TOOLKIT PATHS"
    create: true
    mode: '0644'
  become: true
  become_user: "{{ recon_toolkit_username }}"

- name: Include subdomain enumeration tool tasks
  ansible.builtin.include_tasks: subdomain_enum.yml

- name: Include HTTP and service discovery tool tasks
  ansible.builtin.include_tasks: http_discovery.yml

- name: Include web crawling and JS analysis tool tasks
  ansible.builtin.include_tasks: web_crawling.yml

- name: Include secret scanning tool tasks
  ansible.builtin.include_tasks: secret_scanning.yml

- name: Include GitHub recon tool tasks
  ansible.builtin.include_tasks: github_recon.yml

- name: Include parameter and pattern analysis tool tasks
  ansible.builtin.include_tasks: param_analysis.yml

- name: Relocate pipx packages before cleanup
  ansible.builtin.include_tasks: relocate_pipx_packages.yml

- name: Relocate Node.js packages before cleanup
  ansible.builtin.include_tasks: relocate_node_packages.yml

---
- name: Compute target user and .ssh directory
  ansible.builtin.set_fact:
    attack_box_target_user: "{{ attack_box_user | default(ansible_facts['user_id']) }}"
    attack_box_ssh_dir: >-
      {{ '/root/.ssh'
         if (attack_box_user | default(ansible_facts['user_id'])) == 'root'
         else ansible_facts['user_dir'] + '/.ssh' }}

- name: Get primary group name of the current user "{{ attack_box_target_user }}"
  ansible.builtin.command:
    cmd: id -gn "{{ attack_box_target_user }}"
  changed_when: false
  register: attack_box_primary_group_name

- name: Ensure .ssh directory exists for "{{ attack_box_target_user }}"
  ansible.builtin.file:
    path: "{{ attack_box_ssh_dir }}"
    state: directory
    owner: "{{ attack_box_target_user }}"
    group: "{{ attack_box_primary_group_name.stdout }}"
    mode: '0700'
  become: true

- name: Get list of public SSH key files
  ansible.builtin.find:
    paths: "{{ attack_box_ssh_dir }}"
    patterns: "*.pub"
  register: attack_box_ssh_key_files
  become: true

- name: Add optionally provided public SSH key files to authorized_keys "{{ attack_box_target_user }}"
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ attack_box_ssh_dir }}/authorized_keys"
    owner: "{{ attack_box_target_user }}"
    group: "{{ attack_box_primary_group_name.stdout }}"
    mode: '0600'
  loop: "{{ attack_box_ssh_key_files.files }}"
  when: attack_box_ssh_key_files.matched > 0
  loop_control:
    label: "{{ item.path }}"
  become: true

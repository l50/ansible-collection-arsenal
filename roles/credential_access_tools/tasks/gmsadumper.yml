---
# Install gMSADumper for gMSA password extraction
# gMSADumper extracts gMSA (Group Managed Service Account) passwords from AD
# Note: gMSADumper is a standalone script, not a pip package - use git clone + venv

- name: Clone gMSADumper from GitHub
  ansible.builtin.git:
    repo: "{{ credential_access_tools_gmsadumper_repo }}"
    dest: "{{ credential_access_tools_gmsadumper_install_dir }}"
    version: "{{ credential_access_tools_gmsadumper_version }}"
    force: true
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - credential_access_tools_install_gmsadumper

- name: Create virtual environment for gMSADumper
  ansible.builtin.command:
    cmd: python3 -m venv {{ credential_access_tools_gmsadumper_install_dir }}/venv
  become: true
  args:
    creates: "{{ credential_access_tools_gmsadumper_install_dir }}/venv"
  when:
    - ansible_facts['os_family'] == 'Debian'
    - credential_access_tools_install_gmsadumper

- name: Install gMSADumper dependencies in venv
  ansible.builtin.pip:
    requirements: "{{ credential_access_tools_gmsadumper_install_dir }}/requirements.txt"
    virtualenv: "{{ credential_access_tools_gmsadumper_install_dir }}/venv"
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - credential_access_tools_install_gmsadumper

- name: Create wrapper script for gMSADumper
  ansible.builtin.copy:
    content: |
      #!/bin/bash
      exec {{ credential_access_tools_gmsadumper_install_dir }}/venv/bin/python \
           {{ credential_access_tools_gmsadumper_install_dir }}/gMSADumper.py "$@"
    dest: /usr/local/bin/gMSADumper
    mode: '0755'
  become: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - credential_access_tools_install_gmsadumper

---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:
    - name: Include default variables
      ansible.builtin.include_vars:
        file: "../../defaults/main.yml"

    - name: Check Impacket GetNPUsers is available
      ansible.builtin.command: which impacket-GetNPUsers
      register: credential_access_tools_getnpusers_check
      changed_when: false
      failed_when: false
      when: credential_access_tools_install_impacket | default(true)

    - name: Assert Impacket GetNPUsers is available
      ansible.builtin.assert:
        that:
          - credential_access_tools_getnpusers_check.rc == 0
        fail_msg: "impacket-GetNPUsers not found"
        success_msg: "impacket-GetNPUsers is installed"
      when: credential_access_tools_install_impacket | default(true)

    - name: Check Impacket secretsdump is available
      ansible.builtin.command: which impacket-secretsdump
      register: credential_access_tools_secretsdump_check
      changed_when: false
      failed_when: false
      when: credential_access_tools_install_impacket | default(true)

    - name: Assert Impacket secretsdump is available
      ansible.builtin.assert:
        that:
          - credential_access_tools_secretsdump_check.rc == 0
        fail_msg: "impacket-secretsdump not found"
        success_msg: "impacket-secretsdump is installed"
      when: credential_access_tools_install_impacket | default(true)

    # Verify impacket regsecrets module is available (required for NetExec SMB)
    - name: Verify impacket regsecrets module in venv
      ansible.builtin.command: /opt/impacket/venv/bin/python -c "from impacket.examples import regsecrets; print('OK')"
      register: credential_access_tools_regsecrets_check
      changed_when: false
      failed_when: false
      when: credential_access_tools_install_impacket | default(true)

    - name: Assert impacket regsecrets module is available
      ansible.builtin.assert:
        that:
          - credential_access_tools_regsecrets_check.rc == 0
        fail_msg: "impacket.examples.regsecrets not found in impacket venv"
        success_msg: "impacket regsecrets module available in venv"
      when: credential_access_tools_install_impacket | default(true)

    - name: Check lsassy is installed
      ansible.builtin.command: which lsassy
      register: credential_access_tools_lsassy_check
      changed_when: false
      failed_when: false
      environment:
        PATH: "/root/.local/bin:{{ ansible_facts['env']['PATH'] }}"
      when: credential_access_tools_install_lsassy | default(true)

    - name: Assert lsassy is available
      ansible.builtin.assert:
        that:
          - credential_access_tools_lsassy_check.rc == 0
        fail_msg: "lsassy not found"
        success_msg: "lsassy is installed"
      when: credential_access_tools_install_lsassy | default(true)

    - name: Check sprayhound is installed
      ansible.builtin.command: which sprayhound
      register: credential_access_tools_sprayhound_check
      changed_when: false
      failed_when: false
      when: credential_access_tools_install_sprayhound | default(true)

    - name: Assert sprayhound is available
      ansible.builtin.assert:
        that:
          - credential_access_tools_sprayhound_check.rc == 0
        fail_msg: "sprayhound not found"
        success_msg: "sprayhound is installed"
      when: credential_access_tools_install_sprayhound | default(true)

    - name: Check netexec is installed
      ansible.builtin.command: which netexec
      register: credential_access_tools_netexec_check
      changed_when: false
      failed_when: false
      environment:
        PATH: "/usr/local/bin:/usr/bin:/bin:/root/.local/bin"
      when: credential_access_tools_install_netexec | default(true)

    - name: Assert netexec is available
      ansible.builtin.assert:
        that:
          - credential_access_tools_netexec_check.rc == 0
        fail_msg: "netexec not found"
        success_msg: "netexec is installed"
      when: credential_access_tools_install_netexec | default(true)

    - name: Check targetedKerberoast wrapper is available
      ansible.builtin.command: which targetedKerberoast
      register: credential_access_tools_targetedkerberoast_check
      changed_when: false
      failed_when: false
      when: credential_access_tools_install_targetedkerberoast | default(true)

    - name: Assert targetedKerberoast is available
      ansible.builtin.assert:
        that:
          - credential_access_tools_targetedkerberoast_check.rc == 0
        fail_msg: "targetedKerberoast not found"
        success_msg: "targetedKerberoast is installed"
      when: credential_access_tools_install_targetedkerberoast | default(true)

    - name: Check smbclient is installed
      ansible.builtin.command: which smbclient
      register: credential_access_tools_smbclient_check
      changed_when: false
      failed_when: false

    - name: Assert smbclient is available
      ansible.builtin.assert:
        that:
          - credential_access_tools_smbclient_check.rc == 0
        fail_msg: "smbclient not found"
        success_msg: "smbclient is installed"

    - name: Check gMSADumper is installed
      ansible.builtin.command: which gMSADumper
      register: credential_access_tools_gmsadumper_check
      changed_when: false
      failed_when: false
      environment:
        PATH: "/root/.local/bin:{{ ansible_facts['env']['PATH'] }}"
      when: credential_access_tools_install_gmsadumper | default(true)

    - name: Assert gMSADumper is available
      ansible.builtin.assert:
        that:
          - credential_access_tools_gmsadumper_check.rc == 0
        fail_msg: "gMSADumper not found"
        success_msg: "gMSADumper is installed"
      when: credential_access_tools_install_gmsadumper | default(true)

---
# Credential access tool packages (Kali-specific)
credential_access_tools_kali_packages:
  - git
  - python3-dev
  - python3-venv
  - build-essential
  - samba-common-bin
  - smbclient

# Credential access tool packages (Ubuntu-compatible)
credential_access_tools_ubuntu_packages:
  - git
  - python3
  - python3-pip
  - python3-dev
  - python3-venv
  - build-essential
  - samba-common-bin
  - smbclient

# Impacket configuration (GetNPUsers, secretsdump, etc.)
credential_access_tools_install_impacket: true
credential_access_tools_impacket_from_source: true
credential_access_tools_impacket_repo: "https://github.com/fortra/impacket.git"
credential_access_tools_impacket_version: "impacket_0_13_0"
credential_access_tools_impacket_install_dir: "/opt/impacket"

# lsassy configuration (remote LSASS credential extraction)
credential_access_tools_install_lsassy: true
credential_access_tools_lsassy_install_dir: "/opt/lsassy"

# sprayhound configuration (password spraying)
credential_access_tools_install_sprayhound: true
credential_access_tools_sprayhound_package: "sprayhound"

# NetExec configuration (password spraying, LAPS/GPP loot, SYSVOL search)
# Required by password_spray, username_as_password, password_policy,
# domain_admin_checker, gpp_password_finder, sysvol_script_search, laps_dump.
# On Kali installs from apt; on Ubuntu installs from GitHub via pipx with
# impacket source injected into the venv (regsecrets module).
credential_access_tools_install_netexec: true
credential_access_tools_netexec_package: "netexec"
credential_access_tools_netexec_repo: "https://github.com/Pennyw0rth/NetExec.git"

# targetedKerberoast configuration (targeted kerberoasting)
# Reference: https://github.com/ShutdownRepo/targetedKerberoast
credential_access_tools_install_targetedkerberoast: true
credential_access_tools_targetedkerberoast_repo: "https://github.com/ShutdownRepo/targetedKerberoast.git"
credential_access_tools_targetedkerberoast_install_dir: "/opt/targetedKerberoast"
credential_access_tools_targetedkerberoast_version: "main"

# gMSADumper configuration (Group Managed Service Account password extraction)
# Reference: https://github.com/micahvandeusen/gMSADumper
# Note: gMSADumper is a standalone script, not a pip package
credential_access_tools_install_gmsadumper: true
credential_access_tools_gmsadumper_repo: "https://github.com/micahvandeusen/gMSADumper.git"
credential_access_tools_gmsadumper_install_dir: "/opt/gMSADumper"
credential_access_tools_gmsadumper_version: "main"

credential_access_tools_update_cache: true

credential_access_tools_pip_break_system_packages: false

# Tool binary paths (for verification)
credential_access_tools_binaries:
  impacket_getnpusers: "/usr/local/bin/impacket-GetNPUsers"
  impacket_secretsdump: "/usr/local/bin/impacket-secretsdump"
  lsassy: "/usr/local/bin/lsassy"
  sprayhound: "/usr/bin/sprayhound"
  netexec: "/usr/local/bin/netexec"
  targetedkerberoast: "/usr/local/bin/targetedKerberoast"
  gmsadumper: "/usr/local/bin/gMSADumper"
  smbclient: "/usr/bin/smbclient"

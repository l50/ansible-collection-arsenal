---
- name: Set ttpforge user home directory
  ansible.builtin.include_tasks: ttpforge_get_user_home.yml

- name: Install required packages for ttpforge
  ansible.builtin.include_role:
    name: cowdogmoo.workstation.package_management
  vars:
    package_management_common_install_packages: "{{ ttpforge_common_install_packages }}"

- name: Ensure home directory exists for ttpforge user
  ansible.builtin.file:
    path: "{{ ttpforge_user_home }}"
    state: directory
    owner: "{{ ttpforge_username }}"
    group: "{{ ttpforge_usergroup }}"
    mode: '0750'
  become: true

- name: Check if .bashrc exists for ttpforge user
  ansible.builtin.stat:
    path: "{{ ttpforge_user_home }}/.bashrc"
  register: ttpforge_bashrc_stat
  become: true

- name: Ensure .bashrc exists for ttpforge user
  ansible.builtin.file:
    path: "{{ ttpforge_user_home }}/.bashrc"
    state: touch
    owner: "{{ ttpforge_username }}"
    group: "{{ ttpforge_usergroup }}"
    mode: '0644'
  become: true
  when: not ttpforge_bashrc_stat.stat.exists

- name: Check if mise is installed for ttpforge user
  ansible.builtin.stat:
    path: "{{ ttpforge_user_home }}/.local/share/mise"
  register: ttpforge_mise_installed

- name: Check if mise binary is installed
  ansible.builtin.stat:
    path: "/usr/local/bin/mise"
  register: ttpforge_mise_binary_installed

- name: Install mise and associated plugins for ttpforge user
  ansible.builtin.include_role:
    name: cowdogmoo.workstation.mise
  vars:
    mise_username: "{{ ttpforge_username }}"
    mise_usergroup: "{{ ttpforge_usergroup }}"
    mise_shell: "{{ ttpforge_shell }}"
    mise_plugins: "{{ ttpforge_mise_plugins }}"
    mise_user_home: "{{ ttpforge_user_home }}"
    mise_data_dir: "{{ ttpforge_user_home }}/.local/share/mise"
    mise_config_dir: "{{ ttpforge_user_home }}/.config/mise"
    mise_bin_dir: "/usr/local/bin"
  when: not ttpforge_mise_installed.stat.exists or not ttpforge_mise_binary_installed.stat.exists

- name: Include TTPForge setup tasks
  ansible.builtin.include_tasks: setup.yml

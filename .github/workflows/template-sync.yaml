---
name: Template Sync
on:
  # checkov:skip=CKV_GHA_7: "Workflow dispatch inputs are required for manual debugging and configuration"
  workflow_dispatch:
    inputs:
      dryRun:
        description: Dry Run
        default: "false"
        required: false
      logLevel:
        description: Log Level
        default: "debug"
        required: false

  # Fan-out from CowDogMoo/ansible-collection-workstation's Template Sync
  # Dispatch workflow; fires within minutes of a template change there.
  repository_dispatch:
    types: [template-sync]

  schedule:
    # Monthly safety net in case a dispatch event is missed.
    - cron: "0 0 1 * *"

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.run_number || github.ref }}

permissions:
  contents: read
  pull-requests: write

jobs:
  template-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"
          owner: "${{ github.repository_owner }}"

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: "${{ steps.app-token.outputs.token }}"

      - name: Template Sync
        uses: AndreasAugustin/actions-template-sync@8a0f668b83c32a0f673353086d74f12b8853d4f5 # v2.5.3
        with:
          source_gh_token: ${{ steps.app-token.outputs.token }}
          target_gh_token: ${{ steps.app-token.outputs.token }}
          git_user_name: github-actions[bot]
          git_user_email: github-actions[bot]@users.noreply.github.com
          pr_title: "chore: sync infrastructure files with ansible collection template"
          pr_labels: sync,template,ansible
          pr_body: |
            🤖 A new version of the ansible collection template files is available.

            This PR was automatically created to sync shared infrastructure:
            - Pre-commit hooks (`.hooks/**`, `.pre-commit-config.yaml`)
            - Task definitions (`Taskfile.yaml`)
            - Editor configs (`.editorconfig`)

            Workflow files are managed by Renovate and excluded from this sync.

            Please review the changes carefully before merging.
          source_repo_path: CowDogMoo/ansible-collection-workstation
          steps: "prechecks,pull,commit,push,pr"
          upstream_branch: main
